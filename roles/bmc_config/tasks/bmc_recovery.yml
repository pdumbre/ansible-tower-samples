- name: Check if password change is required
  set_fact:
    bmc_password_change_required: >-
      {{ 'PasswordChangeRequired' in (systems.json.error
         ['@Message.ExtendedInfo'][0].MessageId | default(''))
         if systems.json is defined and 'error' in systems.json
         else false }}
  when: systems is defined

- name: Configure BMC Account
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/AccountService/Accounts/1"
    method: PATCH
    user: "{{ default_user }}"
    password: "{{ default_password }}"
    validate_certs: "{{ redfish_validate_certs | default(false) }}"
    force_basic_auth: yes
    body_format: json
    body:
      Password: "{{ bmc_password }}"
    status_code: 200
  delegate_to: "{{ bmc_delegate_host }}"
  register: bmc_account_result

