
---
# Gather firmware information from BMC using Redfish API
# Equivalent to getVpdFwInfo() methods

- name: Get firmware inventory for Dell systems
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/UpdateService/FirmwareInventory"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: dell_firmware_inventory
  delegate_to: "{{ bmc_delegate_host }}"
  when: is_dell_system | bool

- name: Extract Dell firmware versions
  set_fact:
    bmc_firmware_info: "{{ bmc_firmware_info | default({}) | combine({item['@odata.id'].split('/')[-1]: {'name': item.Name | default(''), 'version': item.Version | default(''), 'updateable': item.Updateable | default(false)}}) }}"
  loop: "{{ dell_firmware_inventory.json.Members | default([]) }}"
  when: is_dell_system | bool

- name: Get firmware inventory for Lenovo systems
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/UpdateService/FirmwareInventory"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: lenovo_firmware_inventory
  delegate_to: "{{ bmc_delegate_host }}"
  when: is_lenovo_system | bool

- name: Get detailed firmware information for Lenovo
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: lenovo_firmware_details
  loop: "{{ lenovo_firmware_inventory.json.Members | default([]) }}"
  delegate_to: "{{ bmc_delegate_host }}"
  when: is_lenovo_system | bool

- name: Extract Lenovo firmware versions
  set_fact:
    bmc_firmware_info: "{{ bmc_firmware_info | default({}) | combine({item.json.Id: {'name': item.json.Name | default(''), 'version': item.json.Version | default(''), 'updateable': item.json.Updateable | default(false), 'release_date': item.json.ReleaseDate | default('')}}) }}"
  loop: "{{ lenovo_firmware_details.results | default([]) }}"
  when: is_lenovo_system | bool and lenovo_firmware_details.results is defined

- name: Get BMC firmware version
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Managers/{{ dell_idrac_id if is_dell_system else 'Self' }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: bmc_manager_info
  delegate_to: "{{ bmc_delegate_host }}"

- name: Add BMC firmware version to info
  set_fact:
    bmc_firmware_info: "{{ bmc_firmware_info | default({}) | combine({'bmc': {'name': 'BMC', 'version': bmc_manager_info.json.FirmwareVersion | default(''), 'model': bmc_manager_info.json.Model | default('')}}) }}"

- name: Display firmware information summary
  debug:
    msg:
      - "BMC Firmware: {{ bmc_firmware_info.bmc.version }}"
      - "Total firmware components: {{ bmc_firmware_info | length }}"
