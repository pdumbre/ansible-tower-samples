# Gather firmware information from BMC using Redfish API
# Vendor-agnostic: works for Dell, Lenovo, and any Redfish-compliant BMC

- name: Retrieve firmware inventory
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/UpdateService/FirmwareInventory"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: firmware_inventory
  delegate_to: "{{ bmc_delegate_host }}"
  no_log: true

- name: Get detailed firmware entry
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: "{{ redfish_validate_certs | default(false) }}"
    force_basic_auth: yes
    status_code: [200]
  register: firmware_details
  loop: "{{ firmware_inventory.json.Members | default([]) }}"
  delegate_to: "{{ bmc_delegate_host }}"
  loop_control:
    label: "{{ item['@odata.id'] | basename }}"
  no_log: true
  retries: "{{ retry_count | default(3) }}"
  delay: "{{ retry_delay | default(10) }}"
  until: firmware_details.status == 200
  failed_when: >
    firmware_details.status | default(0) != 200 or
    (firmware_details.json is defined and 'error' in firmware_details.json)
    
- name: Build firmware info dict from inventory details
  set_fact:
    bmc_firmware_info: >-
      {{ bmc_firmware_info | default({}) | combine({
        item.json.Id: {
          'name':         item.json.Name        | default(''),
          'version':      item.json.Version     | default(''),
          'updateable':   item.json.Updateable  | default(false),
          'release_date': item.json.ReleaseDate | default('')
        }
      }) }}
  loop: "{{ firmware_details.results | default([]) }}"
  no_log: true
  
- name: Retrieve BMC manager details
  uri:
    url: "{{ bmc_manager_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: bmc_manager_info
  delegate_to: "{{ bmc_delegate_host }}"

- name: Add BMC firmware version to info
  set_fact:
    bmc_firmware_info: "{{ bmc_firmware_info | default({}) | combine({
      'bmc': {
        'name':    'BMC',
        'version': bmc_manager_info.json.FirmwareVersion | default(''),
        'model':   bmc_manager_info.json.Model           | default('')
      }
    }) }}"

- name: Display firmware information summary
  debug:
    msg:
      - "BMC Model:   {{ bmc_firmware_info.bmc.model }}"
      - "BMC Firmware: {{ bmc_firmware_info.bmc.version }}"
      - "Total firmware components: {{ bmc_firmware_info | length }}"
