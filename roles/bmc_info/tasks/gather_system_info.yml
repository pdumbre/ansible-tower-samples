
---
# Gather system VPD and hardware information from BMC using Redfish API
# Equivalent to getVpdSysInfo() and getRackInfo() methods

- name: Get system information
  uri:
    url: "{{ bmc_systems_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: system_info
  delegate_to: "{{ bmc_delegate_host }}"

- name: Get chassis information
  uri:
    url: "{{ bmc_chassis_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: chassis_info
  delegate_to: "{{ bmc_delegate_host }}"
  failed_when: false

- name: Extract Dell system VPD information
  set_fact:
    bmc_system_info:
      manufacturer: "{{ system_info.json.Manufacturer | default('') }}"
      model: "{{ system_info.json.Model | default('') }}"
      serial_number: "{{ system_info.json.SerialNumber | default('') }}"
      sku: "{{ system_info.json.SKU | default('') }}"
      bios_version: "{{ system_info.json.BiosVersion | default('') }}"
      processor_model: "{{ system_info.json.ProcessorSummary.Model | default('') }}"
      processor_count: "{{ system_info.json.ProcessorSummary.Count | default(0) }}"
      total_memory_gb: "{{ (system_info.json.MemorySummary.TotalSystemMemoryGiB | default(0)) }}"
      power_state: "{{ system_info.json.PowerState | default('') }}"
      system_type: "{{ system_info.json.SystemType | default('') }}"
      uuid: "{{ system_info.json.UUID | default('') }}"
      asset_tag: "{{ chassis_info.json.AssetTag | default('') }}"
      part_number: "{{ chassis_info.json.PartNumber | default('') }}"
      chassis_type: "{{ chassis_info.json.ChassisType | default('') }}"

- name: Display system information
  debug:
    msg:
      - "Manufacturer: {{ bmc_system_info.manufacturer }}"
      - "Model: {{ bmc_system_info.model }}"
      - "Serial Number: {{ bmc_system_info.serial_number }}"
      - "BIOS Version: {{ bmc_system_info.bios_version }}"
      - "Processor: {{ bmc_system_info.processor_model }} ({{ bmc_system_info.processor_count }})"
      - "Memory: {{ bmc_system_info.total_memory_gb }} GB"
      - "Power State: {{ bmc_system_info.power_state }}"
