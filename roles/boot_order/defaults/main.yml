
# Seconds to wait after power cycle
power_wait_seconds: 300
power_off_wait_seconds: 5
boot_slot_settle_seconds: 240  # 4 minutes for BIOS to settle after reboot

# Max retries for Dell job completion polling
job_poll_retries: 10
job_poll_delay: 120  # 2 minutes between polls

# MTM to Server Model Mapping
mtm_to_model:
  # Lenovo ThinkSystem SR645
  "7D2XCTO1WW": "sr645"
  
  # Lenovo ThinkSystem SR630
  "7X02CTO1WW": "sr630"
  
  # Lenovo ThinkSystem SR665
  "7D2VCTO1WW": "sr665"
  
  # Lenovo ThinkSystem SR650
  "7D76CTO1WW": "sr650"
  
  # Lenovo ThinkSystem SR675
  "7D9RCTO1WW": "sr675"
  "7D9RCTO2WW": "sr675"
  
  # Lenovo ThinkSystem SR630v3
  "7D73CTO1WW": "sr630v3"
  
  # Dell XLR660
  "2668": "xlr660"
  
  # Dell XE7745
  "3350": "xe7745"


# Models that use "Disabled/Enabled" (vs "Disable/Enable") for IPv4/IPv6 PXE
new_asu_syntax_models:
  - sr630v3
  - sr675


# Expansion Card Slots by Model
expansion_cards:
  sr645:
    OCP:
      slots:
        - - 4
        
  sr630:
    OCP:
      slots:
        - - 4
  sr665:
    OCP:
      slots:
        - - 4
        
  sr650:
    OCP:
      slots:
        - - 4
        
  sr675:
    OCP:
      slots:
        - - 4
        
  sr630v3:
    OCP:
      slots:
        - - 4
        
  sr630v3Serv:
    OCP:
      slots:
        - - 4
        
  xlr660:
    OCP:
      slots:
        - - 2
        
  xe7745:
    OCP:
      slots:
        - - 9
