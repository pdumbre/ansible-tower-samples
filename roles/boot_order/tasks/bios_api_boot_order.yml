
# Boot order configuration via Redfish (XCC-based Lenovo nodes)

- name: Get system info via Redfish
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Systems/{{ bmc_system_id | default('1') }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: redfish_sys_info
  delegate_to: localhost

- name: Extract MTM prefix from SKU (Lenovo uses SKU not Model)
  set_fact:
    system_mtm_prefix: >-
      {{ redfish_sys_info.json.SKU | default('')
         | upper | regex_replace('^([A-Z0-9]{4}).*', '\1') }}

- name: Resolve model name from MTM prefix
  set_fact:
    node_model: "{{ mtm_model_map[system_mtm_prefix] | default('unknown') }}"

- name: Fail if MTM prefix not recognized
  fail:
    msg: "Unrecognized MTM prefix '{{ system_mtm_prefix }}' for RU {{ ru_num }}"
  when: node_model == 'unknown'

- name: Log detected model
  debug:
    msg: "RU {{ ru_num }} - MTM prefix: {{ system_mtm_prefix }}, model: {{ node_model }}"

- name: Fail if pxe_slot is not defined
  fail:
    msg: >
      pxe_slot is not defined for RU {{ ru_num }}.
      Ensure pxe_slot is set in an earlier task.
  when: pxe_slot is not defined or pxe_slot == ''

- name: Get current BIOS attributes via Redfish
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Systems/{{ bmc_system_id | default('1') }}/Bios"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: bios_info
  delegate_to: localhost

- name: Extract current boot order entries
  set_fact:
    boot_order_entries: >-
      {{ bios_info.json.Attributes.BootOrder | default([]) }}

- name: Debug current boot order
  debug:
    msg:
      - "pxe_slot            : {{ pxe_slot }}"
      - "boot_order_entries  : {{ boot_order_entries }}"

- name: Find IPv4 PXE boot entry matching pxe_slot
  set_fact:
    pxe_slot_ipv4: >-
      {{ boot_order_entries | select('match',
           '(?i).*' + pxe_slot + '.*ip[v]?4.*'
         ) | list | first | default('') }}

- name: Fail if IPv4 PXE entry not found for pxe_slot
  fail:
    msg: >
      Could not find IPv4 PXE entry for RU {{ ru_num }}.
      pxe_slot           : {{ pxe_slot }}
      Available entries  : {{ boot_order_entries }}
  when: pxe_slot_ipv4 == ''

- name: Build new boot order with IPv4 PXE entry first
  set_fact:
    new_boot_order: >-
      {{ [pxe_slot_ipv4]
         + (boot_order_entries
            | reject('equalto', pxe_slot_ipv4)
            | list) }}

- name: Apply new boot order via Redfish PATCH
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Systems/{{ bmc_system_id | default('1') }}/Bios/Settings"
    method: PATCH
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      Attributes:
        BootOrder: "{{ new_boot_order }}"
    status_code: [200, 202, 204]
  register: patch_result
  delegate_to: localhost

- name: Store pxeSlotLabel
  set_fact:
    pxe_slot_label: "{{ pxe_slot_ipv4 }}"

- name: Display boot order configuration summary
  debug:
    msg:
      - "RU             : {{ ru_num }}"
      - "Model          : {{ node_model }}"
      - "MTM prefix     : {{ system_mtm_prefix }}"
      - "pxe_slot       : {{ pxe_slot }}"
      - "IPv4 PXE entry : {{ pxe_slot_ipv4 }}"
      - "New boot order : {{ new_boot_order }}"
      - "pxeSlotLabel   : {{ pxe_slot_label }}"
      - "Patch status   : {{ patch_result.status }}"
