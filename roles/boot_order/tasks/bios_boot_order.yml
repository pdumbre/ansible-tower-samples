

- name: Get current BIOS attributes via Redfish
  uri:
    url: "{{ bmc_bios_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: bios_info
  delegate_to: localhost

- name: Extract all LegacyBootProtocol keys
  set_fact:
    all_legacy_keys: >-
      {{ bios_info.json.Attributes
         | dict2items
         | selectattr('key', 'search', 'LegacyBootProtocol')
         | map(attribute='key')
         | list }}

- name: Extract all PxeBootFilters keys
  set_fact:
    all_pxe_filter_keys: >-
      {{ bios_info.json.Attributes
         | dict2items
         | selectattr('key', 'search', 'PxeBootFilters')
         | map(attribute='key')
         | list }}

- name: Debug available keys
  debug:
    msg:
      - "pxe_nic_slot         : {{ pxe_nic_slot }}"
      - "LegacyBootProtocol   : {{ all_legacy_keys }}"
      - "PxeBootFilters keys  : {{ all_pxe_filter_keys }}"

- name: Find target PxeBootFilters key matching pxe_nic_slot
  set_fact:
    target_pxe_filter_key: >-
      {{ all_pxe_filter_keys
         | select('search', '(?i)' + pxe_nic_slot)
         | list | first | default('') }}

- name: Fail if no PxeBootFilters key found for pxe_nic_slot
  fail:
    msg: >
      Could not find PxeBootFilters key for
      pxe_nic_slot     : {{ pxe_nic_slot }}
      Available keys   : {{ all_pxe_filter_keys }}
  when: target_pxe_filter_key == ''

- name: Debug resolved target key
  debug:
    msg:
      - "pxe_nic_slot          : {{ pxe_nic_slot }}"
      - "target_pxe_filter_key : {{ target_pxe_filter_key }}"

- name: Build attributes - disable LegacyBootProtocol on ALL ports
  set_fact:
    disable_legacy_attrs: >-
      {{ dict(all_legacy_keys | zip_longest([], fillvalue='None')) }}

- name: Build attributes - disable UEFI PXE on all OTHER ports
  set_fact:
    disable_pxe_filter_attrs: >-
      {{
        dict(
          all_pxe_filter_keys
          | reject('equalto', target_pxe_filter_key)
          | zip_longest([], fillvalue='Enabled')
        )
      }}

- name: Verify global UEFI network stack is enabled
  uri:
    url: "{{ bmc_bios_url }}/Settings"
    method: PATCH
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      Attributes:
        NetworkStackSettings_NetworkStack:   "Enabled"
        NetworkStackSettings_IPv4PXESupport: "Enabled"
    status_code: [200, 202, 204]
  register: network_stack_result
  delegate_to: localhost

- name: Disable LegacyBootProtocol on ALL NIC ports
  uri:
    url: "{{ bmc_bios_url }}/Settings"
    method: PATCH
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      Attributes: "{{ disable_legacy_attrs }}"
    status_code: [200, 202, 204]
  register: disable_legacy_result
  delegate_to: localhost
  when: all_legacy_keys | length > 0

- name: Disable UEFI PXE on all other NIC ports
  uri:
    url: "{{ bmc_bios_url }}/Settings"
    method: PATCH
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      Attributes: "{{ disable_pxe_filter_attrs }}"
    status_code: [200, 202, 204]
  register: disable_pxe_result
  delegate_to: localhost
  when: disable_pxe_filter_attrs | length > 0

- name: Enable UEFI PXE on target NIC port only
  uri:
    url: "{{ bmc_bios_url }}/Settings"
    method: PATCH
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      Attributes:
        "{{ target_pxe_filter_key }}": "Disabled"
    status_code: [200, 202, 204]
  register: enable_result
  delegate_to: localhost

- name: Store pxeSlotLabel
  set_fact:
    pxe_slot_label: "{{ target_pxe_filter_key }}"

- name: Display boot configuration summary
  debug:
    msg:
      - "RU                    : {{ ru_number }}"
      - "Model                 : {{ node_model }}"
      - "MTM prefix            : {{ system_mtm_prefix }}"
      - "pxe_nic_slot          : {{ pxe_nic_slot }}"
      - "target_pxe_filter_key : {{ target_pxe_filter_key }}"
      - "Legacy disabled on    : {{ all_legacy_keys | length }} ports"
      - "PXE disabled on       : {{ disable_pxe_filter_attrs.keys() | list }}"
      - "PXE enabled on        : {{ target_pxe_filter_key }}"
      - "Network stack status  : {{ network_stack_result.status }}"
      - "Enable PXE status     : {{ enable_result.status }}"
      - "pxeSlotLabel          : {{ pxe_slot_label }}"
