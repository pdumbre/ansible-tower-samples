---
# Configure PXE Boot Order
#
# Algorithm:
#   1. Disable LegacyPXEMode.1-8 for all device types
#   2. Disable IPv4/IPv6 PXE stack → reboot OS
#   3. Re-enable IPv4/IPv6 PXE stack → reboot OS
#   4. Wait for UEFI to populate NIC slot entries
#   5. Read BootOrder.NetworkBootOrder via OneCLI
#   6. Find OCP slot IPv4 (port 0/0) and IPv6 (port 0/0) entries
#   7. Set boot order to: IPv4_entry=IPv6_entry
#   8. Store PXE MAC address and slot label

# -----------------------------------------------------------------------
# Step 1 — Disable LegacyPXEMode.1-8 (all device types)
# -----------------------------------------------------------------------
- name: Display PXE boot order configuration start
  debug:
    msg:
      - "Configuring PXE BootOrder"
      - "Device Type: {{ node_device_type }}"
      - "OCP PXE slot: {{ pxe_boot_slot }}"

- name: Disable LegacyPXEMode entries 1-8 via OneCLI
  command: >
    {{ onecli_bin }} config set
    NetworkBootSettings.LegacyPXEMode.{{ item }}
    Disable
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  loop: "{{ range(1, 9) | list }}"
  register: legacy_pxe_disable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: legacy_pxe_disable.rc == 0
  changed_when: "'Successfully' in legacy_pxe_disable.stdout"
  failed_when: legacy_pxe_disable.rc != 0

# -----------------------------------------------------------------------
# Step 2 — Disable IPv4/IPv6 PXE → reboot OS
# Note: sr630v3 (7D73) and sr675 (7D9R) use "Disabled/Enabled" syntax
#       All other device types use "Disable/Enable" syntax
# -----------------------------------------------------------------------
- name: Set IPv6 PXE support value for disable
  set_fact:
    pxe_disable_value: "{{ 'Disabled' if rack_mtm is search('^7D73|^7D9R') else 'Disable' }}"
    pxe_enable_value: "{{ 'Enabled' if rack_mtm is search('^7D73|^7D9R') else 'Enable' }}"

- name: Disable IPv6 PXE support via OneCLI
  command: >
    {{ onecli_bin }} config set
    NetworkStackSettings.IPv6PXESupport
    {{ pxe_disable_value }}
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  register: ipv6_pxe_disable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv6_pxe_disable.rc == 0
  changed_when: "'Successfully' in ipv6_pxe_disable.stdout"
  failed_when: ipv6_pxe_disable.rc != 0

- name: Disable IPv4 PXE support via OneCLI
  command: >
    {{ onecli_bin }} config set
    NetworkStackSettings.IPv4PXESupport
    {{ pxe_disable_value }}
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  register: ipv4_pxe_disable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv4_pxe_disable.rc == 0
  changed_when: "'Successfully' in ipv4_pxe_disable.stdout"
  failed_when: ipv4_pxe_disable.rc != 0

- name: Reboot OS to apply PXE disable (first reboot)
  include_tasks: power_management.yml
  vars:
    power_action: "reboot"

# -----------------------------------------------------------------------
# Step 3 — Re-enable IPv4/IPv6 PXE → reboot OS
# -----------------------------------------------------------------------
- name: Enable IPv6 PXE support via OneCLI
  command: >
    {{ onecli_bin }} config set
    NetworkStackSettings.IPv6PXESupport
    {{ pxe_enable_value }}
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  register: ipv6_pxe_enable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv6_pxe_enable.rc == 0
  changed_when: "'Successfully' in ipv6_pxe_enable.stdout"
  failed_when: ipv6_pxe_enable.rc != 0

- name: Enable IPv4 PXE support via OneCLI
  command: >
    {{ onecli_bin }} config set
    NetworkStackSettings.IPv4PXESupport
    {{ pxe_enable_value }}
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  register: ipv4_pxe_enable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv4_pxe_enable.rc == 0
  changed_when: "'Successfully' in ipv4_pxe_enable.stdout"
  failed_when: ipv4_pxe_enable.rc != 0

- name: Reboot OS to apply PXE enable (second reboot)
  include_tasks: power_management.yml
  vars:
    power_action: "reboot"

# -----------------------------------------------------------------------
# Step 4 — Wait 4 minutes for UEFI to populate NIC slot entries
# -----------------------------------------------------------------------
- name: Wait for UEFI to update NIC slot boot entries
  debug:
    msg: "Waiting 4 minutes for UEFI to populate NIC slot entries..."

- name: Pause 4 minutes for slot update
  pause:
    seconds: 240
    prompt: "Waiting for UEFI NIC slot entries to populate (4 min)"

# -----------------------------------------------------------------------
# Step 5 — Read BootOrder.NetworkBootOrder via OneCLI
# -----------------------------------------------------------------------
- name: Read current NetworkBootOrder via OneCLI
  command: >
    {{ onecli_bin }} config show
    BootOrder.NetworkBootOrder
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  register: network_boot_order_raw
  changed_when: false
  failed_when: network_boot_order_raw.rc != 0

- name: Parse NetworkBootOrder output into list
  set_fact:
    # Strip surrounding quotes and 'ok' from OneCLI output then split on =
    boot_order_entries: >-
      {{
        network_boot_order_raw.stdout
        | regex_replace('"', '')
        | regex_replace('ok', '')
        | regex_replace('BootOrder\\.NetworkBootOrder=', '')
        | trim
        | split('=')
        | map('trim')
        | list
      }}

- name: Display parsed boot order entries
  debug:
    msg:
      - "Total boot order entries: {{ boot_order_entries | length }}"
      - "Entries: {{ boot_order_entries }}"

# -----------------------------------------------------------------------
# Step 6 — Find OCP slot IPv4 and IPv6 entries matching SLOT <pxeBootSlot> 0/0
# sr630 (7X02) uses pxe_boot_slot = 0 (special case — skip slot filtering)
# -----------------------------------------------------------------------
- name: Find IPv4 PXE slot entry for OCP slot
  set_fact:
    pxe_slot_ipv4: >-
      {%- set found = [] -%}
      {%- for entry in boot_order_entries -%}
        {%- if node_device_type == 'sr630' -%}
          {%- if 'UEFI:' in entry and ('IPv4' in entry or 'IP4' in entry) and '0/0' in entry -%}
            {%- if found | length == 0 -%}{%- set _ = found.append(entry.strip()) -%}{%- endif -%}
          {%- endif -%}
        {%- else -%}
          {%- set slot_pattern = 'SLOT' ~ ' ' ~ pxe_boot_slot -%}
          {%- set slot_pattern_nospace = 'SLOT' ~ pxe_boot_slot -%}
          {%- if 'UEFI:' in entry
              and (slot_pattern in entry or slot_pattern_nospace in entry)
              and ('IPv4' in entry or 'IP4' in entry or 'ipv4' in entry)
              and '0/0' in entry -%}
            {%- if found | length == 0 -%}{%- set _ = found.append(entry.strip()) -%}{%- endif -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ found | first | default('') }}

- name: Find IPv6 PXE slot entry for OCP slot
  set_fact:
    pxe_slot_ipv6: >-
      {%- set found = [] -%}
      {%- for entry in boot_order_entries -%}
        {%- if node_device_type == 'sr630' -%}
          {%- if 'UEFI:' in entry and ('IPv6' in entry or 'IP6' in entry or 'ip6' in entry) and '0/0' in entry -%}
            {%- if found | length == 0 -%}{%- set _ = found.append(entry.strip()) -%}{%- endif -%}
          {%- endif -%}
        {%- else -%}
          {%- set slot_pattern = 'SLOT' ~ ' ' ~ pxe_boot_slot -%}
          {%- set slot_pattern_nospace = 'SLOT' ~ pxe_boot_slot -%}
          {%- if 'UEFI:' in entry
              and (slot_pattern in entry or slot_pattern_nospace in entry)
              and ('IPv6' in entry or 'IP6' in entry or 'ipv6' in entry or 'ip6' in entry)
              and '0/0' in entry -%}
            {%- if found | length == 0 -%}{%- set _ = found.append(entry.strip()) -%}{%- endif -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ found | first | default('') }}

- name: Display found PXE slot entries
  debug:
    msg:
      - "OCP PXE slot:  {{ pxe_boot_slot }}"
      - "IPv4 entry:    {{ pxe_slot_ipv4 }}"
      - "IPv6 entry:    {{ pxe_slot_ipv6 }}"

# Fail fast if either entry not found — matches Groovy exception behaviour
- name: Fail if IPv4 PXE slot entry not found
  fail:
    msg: >
      Could not find IPv4 PXE boot entry for SLOT {{ pxe_boot_slot }} (port 0/0)
      in NetworkBootOrder output.
      Available entries:
      {{ boot_order_entries | join('\n') }}
  when: pxe_slot_ipv4 == ''

- name: Fail if IPv6 PXE slot entry not found
  fail:
    msg: >
      Could not find IPv6 PXE boot entry for SLOT {{ pxe_boot_slot }} (port 0/0)
      in NetworkBootOrder output.
      Available entries:
      {{ boot_order_entries | join('\n') }}
  when: pxe_slot_ipv6 == ''

# -----------------------------------------------------------------------
# Step 7 — Set boot order to IPv4=IPv6 for the OCP slot only
# Groovy: imm.command("asu set BootOrder.NetworkBootOrder \"${pxeSlot}=${pxeSlot2}\"")
# Note: Groovy puts IPv4 first, IPv6 second
# -----------------------------------------------------------------------
- name: Build final NetworkBootOrder string
  set_fact:
    final_network_boot_order: "{{ pxe_slot_ipv4 }}={{ pxe_slot_ipv6 }}"

- name: Display final NetworkBootOrder to be set
  debug:
    msg: "Setting NetworkBootOrder: {{ final_network_boot_order }}"

- name: Set NetworkBootOrder via OneCLI
  command: >
    {{ onecli_bin }} config set
    BootOrder.NetworkBootOrder
    "{{ final_network_boot_order }}"
    --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_libs }}"
  delegate_to: "{{ onecli_jump_host }}"
  register: set_boot_order_result
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: set_boot_order_result.rc == 0
  changed_when: "'Successfully' in set_boot_order_result.stdout"
  failed_when: set_boot_order_result.rc != 0

- name: Display boot order configuration result
  debug:
    msg:
      - "NetworkBootOrder configured successfully"
      - "  IPv4: {{ pxe_slot_ipv4 }}"
      - "  IPv6: {{ pxe_slot_ipv6 }}"

# -----------------------------------------------------------------------
# Step 8 — Get MAC address for PXE slot and store node info
# Groovy: imm.getAdapterNetworkAddresses("slot-${pxeBootSlot}")
# Equivalent: read from BIOS attributes already fetched
# -----------------------------------------------------------------------
- name: Get BIOS attributes to extract PXE MAC address
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Systems/1/Bios"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: "{{ redfish_validate_certs | default(false) }}"
    force_basic_auth: yes
  delegate_to: localhost
  register: bios_response_mac

# Extract MAC from IPv4 slot entry — MAC is always the last token after " - "
- name: Extract PXE MAC address from IPv4 slot entry
  set_fact:
    pxe_mac_raw: "{{ pxe_slot_ipv4.split(' - ') | last | trim }}"

# Format MAC to lowercase colon-separated (matches Groovy pxeMacFormat)
- name: Format PXE MAC address to lowercase colon-separated
  set_fact:
    pxe_mac_formatted: "{{ pxe_mac_raw | lower | regex_replace(':', ':') }}"

- name: Display PXE slot info
  debug:
    msg:
      - "PXE slot label:       {{ pxe_slot_ipv4 }}"
      - "PXE MAC address:      {{ pxe_mac_formatted }}"
      - "OCP slot:             {{ pxe_boot_slot }}"
