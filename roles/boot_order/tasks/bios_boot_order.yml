---
# Configure PXE Boot Order
#
# Algorithm:
#   1. Disable LegacyPXEMode.1-8 for all device types
#   2. Disable IPv4/IPv6 PXE stack → reboot OS
#   3. Re-enable IPv4/IPv6 PXE stack → reboot OS
#   4. Wait 4 minutes for UEFI to populate NIC slot entries
#   5. Read BootOrder.NetworkBootOrder via OneCLI
#   6. Find OCP slot IPv4 (port 0/0) and IPv6 (port 0/0) entries
#   7. Set boot order to: IPv4_entry=IPv6_entry
#   8. Store PXE MAC address and slot label


- name: Prepare OneCli on jump host
  include_tasks: prepare_onecli.yml
    
- name: Display PXE boot order configuration start
  debug:
    msg:
      - "Configuring PXE BootOrder"
      - "Device Type: {{ node_model }}"
      - "OCP PXE slot: {{ ocp_slot_num }}"
      
- name: Set BMC connection string for OneCLI
  set_fact:
    bmc_opts: "--bmc {{ bmc_user }}:{{ bmc_password }}@[{{ ipv6ULA }}]"

- name: Retrieve current LegacyPXEMode entries
  command: >
    {{ onecli_binary }} config show
    NetworkBootSettings.LegacyPXEMode.{{ item }}
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  loop: "{{ range(1, 9) | list }}"
  register: legacy_pxe_current
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: legacy_pxe_current.rc == 0
  failed_when: false

- name: Display current LegacyPXEMode status
  debug:
    msg: "LegacyPXEMode.{{ item.item }}: {{ item.stdout | trim }}"
  loop: "{{ legacy_pxe_current.results }}"
  loop_control:
    label: "Entry {{ item.item }}"

- name: Disable LegacyPXEMode entries
  command: >
    {{ onecli_binary }} config set
    NetworkBootSettings.LegacyPXEMode.{{ item }}
    Disable
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  loop: "{{ range(1, 9) | list }}"
  register: legacy_pxe_disable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: legacy_pxe_disable.rc == 0
  changed_when: "'Successfully' in legacy_pxe_disable.stdout"
  failed_when: legacy_pxe_disable.rc != 0

- name: Set PXE support value
  set_fact:
    pxe_disable_value: "{{ 'Disabled' if node_model in new_asu_syntax_models else 'Disable' }}"
    pxe_enable_value: "{{ 'Enabled' if node_model in new_asu_syntax_models else 'Enable' }}"

- name: Disable IPv6 PXE support 
  command: >
    {{ onecli_binary }} config set
    NetworkStackSettings.IPv6PXESupport
    {{ pxe_disable_value }}
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  register: ipv6_pxe_disable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv6_pxe_disable.rc == 0
  changed_when: "'Successfully' in ipv6_pxe_disable.stdout"
  failed_when: ipv6_pxe_disable.rc != 0

- name: Disable IPv4 PXE support
  command: >
    {{ onecli_binary }} config set
    NetworkStackSettings.IPv4PXESupport
    {{ pxe_disable_value }}
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  register: ipv4_pxe_disable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv4_pxe_disable.rc == 0
  changed_when: "'Successfully' in ipv4_pxe_disable.stdout"
  failed_when: ipv4_pxe_disable.rc != 0

- name: Reboot OS to apply PXE disable (first reboot)
  include_tasks: power_management.yml
  vars:
    power_action: "cycle"

- name: Enable IPv4 PXE support
  command: >
    {{ onecli_binary }} config set
    NetworkStackSettings.IPv4PXESupport
    {{ pxe_enable_value }}
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  register: ipv4_pxe_enable
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: ipv4_pxe_enable.rc == 0
  changed_when: "'Successfully' in ipv4_pxe_enable.stdout"
  failed_when: ipv4_pxe_enable.rc != 0

- name: Reboot OS to apply PXE enable (second reboot)
  include_tasks: power_management.yml
  vars:
    power_action: "cycle"


- name: Read current NetworkBootOrder via OneCLI
  command: >
    {{ onecli_binary }} config show
    BootOrder.NetworkBootOrder
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  register: network_boot_order_raw
  changed_when: false
  failed_when: network_boot_order_raw.rc != 0
  retries: "{{ retry_count | default(3) }}"
  delay: "{{ retry_delay | default(10) }}"
  until: network_boot_order_raw.rc == 0

- name: Parse NetworkBootOrder output into list
  set_fact:
    # Strip surrounding quotes and 'ok' from OneCLI output then split on =
    boot_order_entries: >-
      {{
        network_boot_order_raw.stdout
        | regex_replace('"', '')
        | regex_replace('ok', '')
        | regex_replace('BootOrder\\.NetworkBootOrder=', '')
        | trim
        | split('=')
        | map('trim')
        | list
      }}

- name: Display parsed boot order entries
  debug:
    msg:
      - "Total boot order entries: {{ boot_order_entries | length }}"
      - "Entries: {{ boot_order_entries }}"

- name: Find IPv4 PXE slot entry for OCP slot
  set_fact:
    pxe_slot_ipv4: >-
      {{
        boot_order_entries
        | select('search', 'UEFI:')
        | select('search', 'SLOT\s*' ~ ocp_slot_num)
        | select('search', '(?i)ip(v)?4')
        | select('search', '0/0')
        | map('trim')
        | first
        | default('')
      }}

- name: Display found PXE slot entries
  debug:
    msg:
      - "OCP slot:    {{ ocp_slot_num }}"
      - "IPv4 entry:  {{ pxe_slot_ipv4 }}"
  
- name: Fail if IPv4 PXE slot entry not found
  fail:
    msg: >
      Could not find IPv4 PXE boot entry for SLOT {{ ocp_slot_num }} (port 0/0)
      in NetworkBootOrder output.
      Available entries:
      {{ boot_order_entries | join('\n') }}
  when: pxe_slot_ipv4 == ''

- name: Build final NetworkBootOrder string
  set_fact:
    final_network_boot_order: "{{ pxe_slot_ipv4 }}"

- name: Display final NetworkBootOrder to be set
  debug:
    msg: "Setting NetworkBootOrder: {{ final_network_boot_order }}"

- name: Set NetworkBootOrder via OneCLI
  command: >
    {{ onecli_binary }} config set
    BootOrder.NetworkBootOrder
    "{{ final_network_boot_order }}"
    --never-check-trust --nolog
    {{ bmc_opts }}
  environment:
    LD_LIBRARY_PATH: "{{ onecli_work_dir }}/lib"
  delegate_to: "{{ bmc_delegate_host }}"
  register: set_boot_order_result
  retries: "{{ retry_count }}"
  delay: "{{ retry_delay }}"
  until: set_boot_order_result.rc == 0
  changed_when: "'Successfully' in set_boot_order_result.stdout"
  failed_when: set_boot_order_result.rc != 0

- name: Display boot order configuration result
  debug:
    msg:
      - "NetworkBootOrder configured successfully"
      - "  IPv4: {{ pxe_slot_ipv4 }}"

- name: Retrieve PXE port MAC
  include_tasks: bios_mac.yml

- name: Display PXE boot order configuration completion
  debug:
    msg:
      - "PXE Boot Order Configuration Completed"
      - "  Device:    {{ node_model }}"
      - "  OCP slot:  {{ ocp_slot_num }}"
      - "  PXE slot:  {{ pxe_slot_ipv4 }}"
      - "  MAC:       {{ pxe_mac_formatted }}"
