
- name: Discover OCP NIC information from BIOS attributes
  block:
    - name: Get BIOS attributes
      uri:
        url: "{{ bmc_bios_url }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: "{{ redfish_validate_certs | default(false) }}"
        force_basic_auth: yes
      delegate_to: localhost
      register: bios_response
      when: bios_response is not defined

    # Finds the OCP NIC key for the configured slot
    # Matches: <VendorPrefix>OCP<anything>__Slot<N>PhysicalPort1LogicalPort1_MACAddress
    # Works for all device types since OCP NIC always contains 'OCP' in key name
        
    - name: Discover OCP NIC BIOS attribute key pattern for slot
      set_fact:
        pxe_nic_key_pattern: >-
          {{ bios_response.json.Attributes.keys()
             | select('search', 'Slot' ~ ocp_slot_num)
             | select('search', 'OCP')
             | select('search', 'PhysicalPort1LogicalPort1_MACAddress')
             | first
             | default('')
             | regex_replace('PhysicalPort1LogicalPort1_MACAddress', '') }}

    - name: Fail if OCP NIC key not discovered
      fail:
        msg: >
          Could not find OCP NIC MACAddress attribute for slot {{ ocp_slot_num }}
          on {{ node_model }}.
          Expected a BIOS attribute key containing:
            'Slot{{ ocp_slot_num }}' + 'OCP' + 'PhysicalPort1LogicalPort1' + 'MACAddress'
      when: pxe_nic_key_pattern == ''

    - name: Display discovered OCP NIC key pattern
      debug:
        msg:
          - "Device type: {{ node_model }}"
          - "OCP slot:    {{ ocp_slot_num }}"
          - "Key pattern: {{ pxe_nic_key_pattern }}PhysicalPort1LogicalPort1_MACAddress"

    - name: Retrieve MAC Address from BIOS attributes
      set_fact:
        pxe_mac_formatted: >-
          {{ bios_response.json.Attributes
             [pxe_nic_key_pattern ~ 'PhysicalPort1LogicalPort1_MACAddress']
             | lower }}
             
    - debug:
        msg: "pxe_mac_formatted = {{ pxe_mac_formatted }}"
        
    - name: Fail if MAC Address not found
      fail:
        msg: >
          MAC address not found using key:
          {{ pxe_nic_key_pattern }}PhysicalPort1LogicalPort1_MACAddress
      when: pxe_mac_formatted == ''

  when: not (use_bios_jobqueue | bool)

- name: Retrieve PXE MAC Address
  block:

    - name: Retrieve OCP NIC details
      uri:
        url: "{{ bmc_base_url }}/redfish/v1/Systems/System.Embedded.1/EthernetInterfaces/{{ dell_pxe_nic_id }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: "{{ redfish_validate_certs | default(false) }}"
        force_basic_auth: yes
      delegate_to: localhost
      register: dell_nic_detail

    - name: Set Dell PXE MAC
      set_fact:
        pxe_mac_formatted: >-
          {{ (dell_nic_detail.json.PermanentMACAddress
              | default(dell_nic_detail.json.MACAddress))
             | lower }}

    - name: Fail if Dell MAC not found
      fail:
        msg: >
          PXE MAC not found for Dell NIC {{ dell_pxe_nic_id }}.
          Available interfaces:
          {{ bmc_base_url }}/redfish/v1/Systems/System.Embedded.1/EthernetInterfaces
      when: pxe_mac_formatted == ''

    - name: Display Dell PXE MAC
      debug:
        msg:
          - "NIC ID:  {{ dell_pxe_nic_id }}"
          - "PXE MAC: {{ pxe_mac_formatted }}"

  when: use_bios_jobqueue | bool
