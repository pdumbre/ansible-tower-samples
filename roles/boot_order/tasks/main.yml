---
- name: Set mokutil fallback to prevent Secure Boot blue screen
  ansible.builtin.command:
    cmd: sudo mokutil --set-fallback-noreboot true
  delegate_to: "{{ node_ipv6 }}"
  vars:
    ansible_user: "{{ os_username }}"
    ansible_password: "{{ os_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ConnectTimeout=300"
  failed_when: false

- name: Handle service node - clear slot label and skip
  block:
    - name: Clear pxeSlotLabel for service node
      set_fact:
        pxe_slot_label: ""

    - name: Log service node skip
      debug:
        msg: "RU {{ ru_num }} is a service node - skipping boot order configuration"
  when: is_service_node | bool and ru_num | int == 23

- name: Probe BMC management interface capability
  ansible.builtin.command:
    cmd: >
      racadm -r {{ bmc_lla }} -u {{ os_username }} -p {{ os_password }} getsysinfo
  register: probe_bmc_interface
  delegate_to: "{{ bmc_delegate_host }}"
  failed_when: false
  changed_when: false
  when: not (is_service_node | bool and ru_num | int == 23)

- name: Set BMC interface style flag
  set_fact:
    use_jobqueue_interface: "{{ probe_bmc_interface.rc is defined and probe_bmc_interface.rc == 0 }}"
  when: not (is_service_node | bool and ru_num | int == 23)

- name: Configure boot order via job queue interface
  include_tasks: jobqueue_boot_order.yml
  when:
    - not (is_service_node | bool and ru_num | int == 23)
    - use_jobqueue_interface | bool

- name: Configure boot order via BIOS API interface
  include_tasks: bios_api_boot_order.yml
  when:
    - not (is_service_node | bool and ru_num | int == 23)
    - not use_jobqueue_interface | bool
