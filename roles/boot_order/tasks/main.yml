---
# Vendor-agnostic PXE boot order configuration
# Supports: Dell (xe7745, xlr660) and Lenovo (sr645, sr630v3, sr630, sr665, sr650, sr675)

- name: Set mokutil fallback to prevent Secure Boot blue screen
  ansible.builtin.command:
    cmd: sudo mokutil --set-fallback-noreboot true
  delegate_to: "{{ node_ipv6 }}"
  vars:
    ansible_user: "{{ node_userid }}"
    ansible_password: "{{ node_password }}"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ConnectTimeout=300"
  failed_when: false

- name: Skip service node (RU 23)
  block:
    - name: Clear pxeSlotLabel for service node
      set_fact:
        pxe_slot_label: ""

    - name: Log service node skip
      debug:
        msg: "RU {{ ru_num }} is a service node - skipping PXE boot order configuration"
  when: is_service_node | bool and ru_num | int == 23

- name: Configure boot order for Dell nodes
  include_tasks: dell_boot_order.yml
  when:
    - not (is_service_node | bool and ru_num | int == 23)
    - device_type in ['xe7745', 'xlr660']

- name: Configure boot order for Lenovo nodes
  include_tasks: lenovo_boot_order.yml
  when:
    - not (is_service_node | bool and ru_num | int == 23)
    - device_type not in ['xe7745', 'xlr660']
