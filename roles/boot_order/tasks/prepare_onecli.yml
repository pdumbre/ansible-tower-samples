---
# Setup OneCLI for Lenovo server management
# Extracts OneCLI package and prepares binaries

# -----------------------------------------------------------------
# Set OneCLI paths
# OneCli variable values are set in RHEL Install Template
# -----------------------------------------------------------------
- name: Set OneCLI source path and working directory
  ansible.builtin.set_fact:
    onecli_source_path: "{{ firmware_base_path }}/onecli"
    onecli_work_dir: "{{ firmware_base_path }}/onecli_{{ inventory_hostname }}"

# ------------------------------------------------------------
# Load OneCLI metadata and determine version based on server model
# Gen nodes (SR645, SR665, SR630) → OneCLI 3.4.0 (oc34)
# All other models → OneCLI 4.1.0 (fix)
# ------------------------------------------------------------
- name: Load OneCLI metadata
  ansible.builtin.slurp:
    src: "{{ onecli_source_path }}/metadata.json"
  register: onecli_metadata_raw
  delegate_to: "{{ bmc_delegate_host }}"

- name: Parse OneCLI metadata
  ansible.builtin.set_fact:
    onecli_metadata: "{{ onecli_metadata_raw.content | b64decode | from_json }}"

- name: Determine OneCLI version key based on server model
  ansible.builtin.set_fact:
    onecli_version_key: >-
      {{ 'oc34' if server_model | lower in ['sr645', 'sr665', 'sr630']
         else 'fix' }}

- name: Set OneCLI tarball from metadata
  ansible.builtin.set_fact:
    onecli_tarball: "{{ onecli_metadata.imageFiles[onecli_version_key] }}"

# ------------------------------------------------------------
# Verify OneCLI file exists
# ------------------------------------------------------------
- name: Check if OneCLI file exists
  ansible.builtin.stat:
    path: "{{ onecli_source_path }}/{{ onecli_tarball }}"
  register: onecli_file_check
  delegate_to: "{{ bmc_delegate_host }}"

- name: Verify OneCLI file is present
  ansible.builtin.assert:
    that:
      - onecli_file_check.stat.exists
      - onecli_file_check.stat.isreg
    fail_msg: "OneCLI file not found: {{ onecli_source_path }}/{{ onecli_tarball }}"
    success_msg: "OneCLI file found: {{ onecli_tarball }}"

- name: Display selected OneCLI configuration
  ansible.builtin.debug:
    msg:
      - "Server Model: {{ server_model }}"
      - "OneCLI Version Key: {{ onecli_version_key }}"
      - "OneCLI Version: {{ onecli_metadata.version }}"
      - "OneCLI File: {{ onecli_tarball }}"
      - "Full Path: {{ onecli_source_path }}/{{ onecli_tarball }}"

# ------------------------------------------------------------
# Clean up existing working directory before extraction
# Cleanup will be performed only for the running host
# ------------------------------------------------------------
- name: Remove existing OneCLI working directory if present
  ansible.builtin.file:
    path: "{{ onecli_work_dir }}"
    state: absent
  delegate_to: "{{ bmc_delegate_host }}"

# ------------------------------------------------------------
# Create working directory
# ------------------------------------------------------------
- name: Create OneCLI working directory
  ansible.builtin.file:
    path: "{{ onecli_work_dir }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ bmc_delegate_host }}"

# ------------------------------------------------------------
# Extract OneCLI
# ------------------------------------------------------------
- name: Extract OneCLI package
  ansible.builtin.unarchive:
    src: "{{ onecli_source_path }}/{{ onecli_tarball }}"
    dest: "{{ onecli_work_dir }}"
    remote_src: yes
  delegate_to: "{{ bmc_delegate_host }}"

# ------------------------------------------------------------
# Set binary paths
# ------------------------------------------------------------
- name: Set rdmount & onecli paths
  ansible.builtin.set_fact:
    rdmount_binary: "{{ onecli_work_dir }}/rdmount"
    rdumount_binary: "{{ onecli_work_dir }}/rdumount"
    onecli_binary: "{{ onecli_work_dir }}/onecli"

# ------------------------------------------------------------
# Ensure executables
# ------------------------------------------------------------
- name: Ensure rdmount and onecli binaries executable
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
  loop:
    - "{{ rdmount_binary }}"
    - "{{ rdumount_binary }}"
    - "{{ onecli_binary }}"
  delegate_to: "{{ bmc_delegate_host }}"

- name: Display OneCLI setup complete
  ansible.builtin.debug:
    msg:
      - "OneCLI setup completed"
      - "Working directory: {{ onecli_work_dir }}"
      - "OneCLI binary: {{ onecli_binary }}"
      - "rdmount binary: {{ rdmount_binary }}"
