
# -----------------------------------------------------------------------
# Common Task — Cleanup Checkpoint
# Required vars:
#   checkpoint_workflow : workflow name
#   checkpoint_host     : inventory_hostname
# -----------------------------------------------------------------------

- name: "[Checkpoint] Remove checkpoint — {{ checkpoint_workflow }}/{{ checkpoint_host }}"
  file:
    path: "/var/lib/awx/checkpoints/{{ checkpoint_workflow }}/{{ checkpoint_host }}.json"
    state: absent
  delegate_to: "{{ onecli_jump_host }}"
  failed_when: false

- name: "[Checkpoint] Confirm cleanup — {{ checkpoint_workflow }}"
  debug:
    msg: "Checkpoint cleared — workflow: {{ checkpoint_workflow }}, host: {{ checkpoint_host }}"
