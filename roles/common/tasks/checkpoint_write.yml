# -----------------------------------------------------------------------
# Common Task — Write Checkpoint
# Required vars:
#   checkpoint_workflow : workflow name
#   checkpoint_host     : inventory_hostname
#   checkpoint_stage    : stage just completed — any string, no registry
# Optional vars:
#   checkpoint_meta     : dict of extra data to store (default: {})
# -----------------------------------------------------------------------

- name: "[Checkpoint] Build updated stages list"
  set_fact:
    _stages_updated: >-
      {{
        (checkpoint_stages_done | default([]))
        | union([checkpoint_stage])
        | unique
      }}

- name: Collect required values as individual facts
  set_fact:
    _ts: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
    _workflow: "{{ checkpoint_workflow }}"
    _host: "{{ checkpoint_host }}"
    _stage: "{{ checkpoint_stage }}"
    _stages_done: "{{ _stages_updated }}"
    
- name: Collect required values as individual facts
  set_fact:
    _history: "{{ (checkpoint_data.history | default([])) + [{
            'stage': _stage,
            'ts': _ts
          }] }}" 
          
- name: Build checkpoint
  set_fact:
    checkpoint: "{{ {
      'workflow': _workflow,
      'ts': _ts,
      'host': _host,
      'stage': _stage,
      'stages_done': _stages_done,
      'last_updated': _ts,
      'history': _history
    } | to_json | from_json }}"

- name: Write checkpoint to file
  copy:
    content: "{{ checkpoint | to_nice_json }}"
    dest: "{{checkpoint_base_dir }}/{{ checkpoint_workflow }}/{{ checkpoint_host }}.json"
    mode: "0600"
  delegate_to: jump-hosst
