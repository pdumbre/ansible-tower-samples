---
# Common role for accessing credentials for a given server and userid
# This role can be included from other roles to retrieve credentials
#
# Required variables:
#   - credential_server_name: The server name to lookup (e.g., "hspeed1-f31l006-secret")
#   - credential_userid: The user ID to retrieve (e.g., "CEUSER", "ISFUSER", "USERID")
#
# Optional variables:
#   - credential_env_var: Environment variable name (default: "BMC_CREDENTIALS")
#
# Returns:
#   - credential_info: Dictionary containing user, group, and password
#   - credential_username: The username
#   - credential_password: The password
#   - credential_group: The user group

- name: Validate required parameters
  ansible.builtin.assert:
    that:
      - credential_server_name is defined
      - credential_server_name | length > 0
      - credential_userid is defined
      - credential_userid | length > 0
    fail_msg: "Required variables 'credential_server_name' and 'credential_userid' must be defined"
    quiet: true

- name: Set default credential environment variable
  ansible.builtin.set_fact:
    credential_env_var: "{{ credential_env_var | default('BMC_CREDENTIALS') }}"

- name: Parse credentials from environment variable
  ansible.builtin.set_fact:
    credentials_parsed: "{{ lookup('env', credential_env_var) | from_json }}"
  when: lookup('env', credential_env_var) != ''

- name: Fail if credentials not available
  ansible.builtin.fail:
    msg: "ERROR: {{ credential_env_var }} environment variable not set. Ensure the credential is attached to the job template."
  when: lookup('env', credential_env_var) == ''

- name: Get server-specific users from credentials
  ansible.builtin.set_fact:
    server_users: "{{ credentials_parsed[credential_server_name] }}"
  when:
    - credentials_parsed is defined
    - credential_server_name in credentials_parsed

- name: Fail if server not found in credentials
  ansible.builtin.fail:
    msg: "ERROR: Server '{{ credential_server_name }}' not found in {{ credential_env_var }}"
  when:
    - credentials_parsed is defined
    - credential_server_name not in credentials_parsed

- name: Get user credentials for server
  ansible.builtin.set_fact:
    credential_info: "{{ server_users | selectattr('user', 'equalto', credential_userid) | first }}"
  when:
    - server_users is defined
    - server_users | selectattr('user', 'equalto', credential_userid) | list | length > 0

- name: Fail if userid not found for server
  ansible.builtin.fail:
    msg: "ERROR: User '{{ credential_userid }}' not found for server '{{ credential_server_name }}'"
  when:
    - server_users is defined
    - server_users | selectattr('user', 'equalto', credential_userid) | list | length == 0

- name: Extract credential details
  ansible.builtin.set_fact:
    credential_username: "{{ credential_info.user }}"
    credential_password: "{{ credential_info.password }}"
    credential_group: "{{ credential_info.group }}"
  when: credential_info is defined

- name: Display retrieved credentials (debug mode)
  ansible.builtin.debug:
    msg:
      - "Server: {{ credential_server_name }}"
      - "User: {{ credential_username }}"
      - "Group: {{ credential_group }}"
      - "Password: [HIDDEN]"
  when:
    - credential_info is defined
    - credential_debug | default(false) | bool
