- name: Build AWX URL
  ansible.builtin.set_fact:
    awx_url: "{{ awx_scheme }}://{{ awx_host }}:{{ awx_port }}"

- name: Get organization details from AWX
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/organizations/?name={{ organization_name | urlencode }}"
    method: GET
    user: "{{ awx_user }}"
    password: "{{ awx_password }}"
    force_basic_auth: true
    validate_certs: no
    status_code: 200
    return_content: true
  register: awx_org_response
  

- name: Check if organization exists
  ansible.builtin.assert:
    that:
      - awx_org_response.json.count > 0
    fail_msg: "Organization '{{ organization_name }}' not found in AWX"
    success_msg: "Organization '{{ organization_name }}' found"
    quiet: true

- name: Extract organization ID and details
  ansible.builtin.set_fact:
    organization_id: "{{ awx_org_response.json.results[0].id }}"
    organization_info: "{{ awx_org_response.json.results[0] }}"

- name: Display organization information
  ansible.builtin.debug:
    msg:
      - "Organization Name: {{ organization_info.name }}"
      - "Organization ID: {{ organization_id }}"
      - "Description: {{ organization_info.description | default('N/A') }}"
  when: awx_debug | default(false) | bool
   
- name: Get credential type ID
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credential_types/?name={{ bmc_credential_type_name | urlencode }}"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: credential_type_query
  delegate_to: jump-host
  run_once: true

- name: Set credential type ID if already exists
  ansible.builtin.set_fact:
    bmc_credential_type_id: "{{ credential_type_query.json.results[0].id }}"
  when: credential_type_query.json.count > 0
  run_once: true

- name: Create AWX custom credential type for BMC users
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credential_types/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ bmc_credential_type_name }}"
      description: "Custom credential type for all BMC user authentication"
      kind: "cloud"
      inputs:
        fields:
          - id: "bmc_credentials_json"
            type: "string"
            label: "BMC Credentials JSON"
            secret: true
            multiline: true
            help_text: >
              JSON format:
              {
                "server01": [
                  {"user": "CEUSER", "password": "pass1", "group": "Administrator"},
                  {"user": "ISFUSER", "password": "pass2", "group": "Administrator"}
                ]
              }
        required:
          - "bmc_credentials_json"
      injectors:
        env:
          BMC_CREDENTIALS: "{% raw %}{{ bmc_credentials_json }}{% endraw %}"
    status_code: [201]
    validate_certs: no
  register: credential_type_result
  delegate_to: jump-host
  run_once: true
  when: credential_type_query.json.count == 0
       
- name: Set credential type ID from newly created
  ansible.builtin.set_fact:
    bmc_credential_type_id: "{{ credential_type_result.json.id }}"
  when: credential_type_query.json.count == 0
  run_once: true

- name: Fail if credential type not found
  ansible.builtin.fail:
    msg: "BMC User Credentials credential type not found in AWX"
  when: bmc_credential_type_id == ''

- name: Initialize empty credentials dict
  ansible.builtin.set_fact:
    bmc_credentials_dict: {}
  run_once: true

- name: Build combined BMC credentials dict
  ansible.builtin.set_fact:
    bmc_credentials_dict: "{{ bmc_credentials_dict | combine({item.name: item.users}) }}"
  loop: "{{ retrieved_cnimm }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true
  no_log: true

- name: Convert credentials dict to JSON string
  ansible.builtin.set_fact:
    bmc_credentials_json_str: "{{ bmc_credentials_dict | to_json }}"
  run_once: true
  no_log: true

- name: Get existing combined BMC credential
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/?name={{ bmc_credential_type_name | urlencode }}"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: existing_combined_credential
  delegate_to: jump-host
  run_once: true
  
- name: Create single combined BMC credential
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ bmc_credential_type_name }}"
      description: "Combined BMC credentials for all nodes"
      organization: "{{ organization_id }}"
      credential_type: "{{ bmc_credential_type_id }}"
      inputs:
        bmc_credentials_json: "{{ bmc_credentials_json_str }}" 
    status_code: [201]
    validate_certs: no
  register: combined_credential_result
  delegate_to: jump-host
  run_once: true
  when: existing_combined_credential.json.count == 0
  no_log: true

- name: Update existing combined BMC credential
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/{{ existing_combined_credential.json.results[0].id }}/"
    method: PATCH
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      inputs:
        bmc_credentials_json: "{{ bmc_credentials_json_str }}" 
    status_code: [200]
    validate_certs: no
  register: combined_credential_update
  delegate_to: jump-host
  run_once: true
  when: existing_combined_credential.json.count > 0
  no_log: true
