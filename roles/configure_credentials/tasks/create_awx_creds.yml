- name: Build AWX URL
  ansible.builtin.set_fact:
    awx_url: "{{ awx_scheme }}://{{ awx_host }}:{{ awx_port }}"
    
- name: Get credential type ID
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credential_types/?name={{ bmc_credential_type_name | urlencode }}"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: credential_type_query
  delegate_to: jump-host
  run_once: true

- name: Set credential type ID if already exists
  ansible.builtin.set_fact:
    bmc_credential_type_id: "{{ credential_type_query.json.results[0].id }}"
  when: credential_type_query.json.count > 0
  run_once: true

- name: Create AWX custom credential type for BMC users
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credential_types/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ bmc_credential_type_name }}"
      description: "Custom credential type for all BMC user authentication"
      kind: "cloud"
      inputs:
        fields:
          - id: "bmc_credentials_json"
            type: "string"
            label: "BMC Credentials JSON"
            secret: true
            multiline: true
            help_text: >
              JSON format:
              {
                "server01": [
                  {"user": "CEUSER", "password": "pass1", "group": "Administrator"},
                  {"user": "ISFUSER", "password": "pass2", "group": "Administrator"}
                ]
              }
        required:
          - "bmc_credentials_json"
      injectors:
        env:
          BMC_CREDENTIALS: "{% raw %}{{ bmc_credentials_json }}{% endraw %}"
    status_code: [201]
    validate_certs: no
  register: credential_type_result
  delegate_to: "{{ jump_host }}"
  run_once: true
  when: credential_type_query.json.count == 0
       
- name: Set credential type ID from newly created
  ansible.builtin.set_fact:
    bmc_credential_type_id: "{{ credential_type_result.json.id }}"
  when: credential_type_query.json.count == 0
  run_once: true

- name: Fail if credential type not found
  ansible.builtin.fail:
    msg: "BMC User Credentials credential type not found in AWX"
  when: bmc_credential_type_id == ''

- name: Build combined BMC credentials JSON
  ansible.builtin.set_fact:
    bmc_credentials_json: >-
      {
        {% for node in retrieved_cnimm %}
        "{{ node.name }}": [
          {% for user in node.users %}
          {
            "user": "{{ user.user }}",
            "password": "{{ user.password | b64decode }}",
            "group": "{{ user.group }}"
          }{% if not loop.last %},{% endif %}
          {% endfor %}
        ]{% if not loop.last %},{% endif %}
        {% endfor %}
      }
  run_once: true

- name: Debug combined credentials JSON
  ansible.builtin.debug:
    msg: "{{ bmc_credentials_json | from_json }}"
  run_once: true

- name: Get existing combined BMC credential
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/?name={{ bmc_credential_type_name | urlencode }}"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: existing_combined_credential
  delegate_to: "{{ jump_host }}"
  run_once: true

- name: Debug existing combined credential
  ansible.builtin.debug:
    msg: "Combined credential already exists with ID: {{ existing_combined_credential.json.results[0].id }}"
  when: existing_combined_credential.json.count > 0
  run_once: true

- name: Create single combined BMC credential
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ bmc_credential_type_name }}"
      description: "Combined BMC credentials for all nodes"
      organization: "{{ awx_organization_id }}"
      credential_type: "{{ bmc_credential_type_id }}"
      inputs:
        bmc_credentials_json: "{{ bmc_credentials_json }}"
    status_code: [201]
    validate_certs: no
  register: combined_credential_result
  delegate_to: "{{ jump_host }}"
  run_once: true
  when: existing_combined_credential.json.count == 0

- name: Update existing combined BMC credential
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/{{ existing_combined_credential.json.results[0].id }}/"
    method: PATCH
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      inputs:
        bmc_credentials_json: "{{ bmc_credentials_json }}"
    status_code: [200]
    validate_certs: no
  register: combined_credential_update
  delegate_to: "{{ jump_host }}"
  run_once: true
  when: existing_combined_credential.json.count > 0   # ✅ update if exists

- name: Display combined credential result
  ansible.builtin.debug:
    msg: >
      Combined BMC credential '{{ bmc_credential_type_name }}'
      {{ 'updated' if existing_combined_credential.json.count > 0 else 'created' }}
      successfully for nodes: {{ retrieved_cnimm | map(attribute='name') | list }}
  run_once: true
  
- name: Get all existing AWX credentials
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/?credential_type={{ bmc_credential_type_id }}&page_size=100"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: existing_credentials
  delegate_to: "jump_host"
  run_once: true

- name: Build list of existing credential names
  ansible.builtin.set_fact:
    existing_credential_names: "{{ existing_credentials.json.results | map(attribute='name') | list }}"
  run_once: true

- name: Debug existing credentials
  ansible.builtin.debug:
    msg: "Existing credentials: {{ existing_credential_names }}"
  run_once: true

- name: Create AWX credentials for each node and user
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ item.0.name }}_{{ item.1.user }}"
      description: "BMC credentials for {{ item.0.name }} - User {{ item.1.user }}"
      organization: "{{ awx_organization_id }}"
      credential_type: "{{ bmc_credential_type_id }}"
      inputs:
        username: "{{ item.1.user }}"
        password: "{{ item.1.password | b64decode }}"
        group: "{{ item.1.group }}"
    status_code: [201]
    validate_certs: no
  loop: "{{ retrieved_cnimm | subelements('users') }}"
  loop_control:
    label: "{{ item.0.name }}_{{ item.1.user }}"
  register: credential_creation_results
  delegate_to: "{{ jump_host }}"
  run_once: true
  when: >
    (item.0.name + '_' + item.1.user) not in existing_credential_names 

- name: Display credential creation summary
  ansible.builtin.debug:
    msg: >
      {{ item.0.name }}_{{ item.1.user }} -
      {{ 'Skipped - already exists' if (item.0.name + '_' + item.1.user)
         in existing_credential_names else 'Created successfully' }}
  loop: "{{ retrieved_cnimm | subelements('users') }}"
  loop_control:
    label: "{{ item.0.name }}_{{ item.1.user }}"
  run_once: true
