- name: Build AWX URL
  ansible.builtin.set_fact:
    awx_url: "{{ awx_scheme }}://{{ awx_host }}:{{ awx_port }}"
    
- name: Get credential type ID
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credential_types/?name={{ bmc_credential_type_name | urlencode }}"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: credential_type_query
  delegate_to: jump-host
  run_once: true

- name: Set credential type ID if already exists
  ansible.builtin.set_fact:
    bmc_credential_type_id: "{{ credential_type_query.json.results[0].id }}"
  when: credential_type_query.json.count > 0
  run_once: true
     
- name: Create AWX custom credential type for BMC users
  uri:
    url: "{{ awx_url }}/api/v2/credential_types/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "BMC User Credentials"
      description: "Custom credential type for BMC user authentication"
      kind: "cloud"
      inputs:
        fields:
          - id: "username"
            type: "string"
            label: "Username"
          - id: "password"
            type: "string"
            label: "Password"
            secret: true
          - id: "group"
            type: "string"
            label: "Group"
        required:
          - "username"
          - "password"
      injectors:
        extra_vars:
          bmc_user: "{% raw %}{{ username }}{% endraw %}"     
          bmc_password: "{% raw %}{{ password }}{% endraw %}"     
          bmc_group: "{% raw %}{{ group }}{% endraw %}"           
    status_code: [200, 201]
    validate_certs: no
  delegate_to: jump-host
  register: credential_type_result
  when: credential_type_query.json.count == 0 
     
- name: Set credential type ID from newly created
  ansible.builtin.set_fact:
    bmc_credential_type_id: "{{ credential_type_result.json.id }}"
  when: credential_type_query.json.count == 0
  run_once: true

- name: Fail if credential type not found
  ansible.builtin.fail:
    msg: "BMC User Credentials credential type not found in AWX"
  when: bmc_credential_type_id == ''

- name: Create AWX custom credentials for each node and user
  uri:
    url: "{{ awx_url }}/api/v2/credentials/"
    method: POST
    url_username: "{{ awx_user}}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ item.0.name }}_{{ item.1.user }}"
      description: "BMC credentials for {{ item.0.name }} - User {{ item.1.user }}"
      organization: "{{ awx_organization_id }}"
      credential_type: "{{ bmc_credential_type_id }}"
      inputs:
        username: "{{ item.1.user }}"                      
        password: "{{ item.1.password | b64decode }}"     
        group: "{{ item.1.group }}"
    status_code: [201, 400]
    validate_certs: no
  loop: "{{ retrieved_cnimm | subelements('users') }}"
  loop_control:
    label: "{{ item.0.name }}_{{ item.1.user }}"         
  register: credential_creation_results
  delegate_to: jump-host
  failed_when:                                           
    credential_creation_results.status == 400 and
    'already exists' not in (credential_creation_results.json.name[0] | default(''))


- name: Display created credentials
  debug:
    msg: "Created credential: {{ item.0.name }}_{{ item.1.user }}"
  loop: "{{ retrieved_cnimm | subelements('users') }}"    
  loop_control:
    label: "{{ item.0.name }}_{{ item.1.user }}"

# ----------------------------------------
# Get all existing credentials in one call
# ----------------------------------------
- name: Get all existing AWX credentials
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/?credential_type={{ imm_credential_type_id }}&page_size=100"
    method: GET
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [200]
  register: existing_credentials
  delegate_to: "{{ jump_host }}"
  run_once: true

- name: Build list of existing credential names
  ansible.builtin.set_fact:
    existing_credential_names: "{{ existing_credentials.json.results | map(attribute='name') | list }}"
  run_once: true

- name: Debug existing credentials
  ansible.builtin.debug:
    msg: "Existing credentials: {{ existing_credential_names }}"
  run_once: true

# ----------------------------------------
# Create only missing credentials
# ----------------------------------------
- name: Create AWX credentials for each node and user
  ansible.builtin.uri:
    url: "{{ awx_url }}/api/v2/credentials/"
    method: POST
    url_username: "{{ awx_user }}"
    url_password: "{{ awx_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "{{ item.0.name }}_{{ item.1.user }}"
      description: "BMC credentials for {{ item.0.name }} - User {{ item.1.user }}"
      organization: "{{ awx_organization_id }}"
      credential_type: "{{ imm_credential_type_id }}"
      inputs:
        username: "{{ item.1.user }}"
        password: "{{ item.1.password | b64decode }}"
        group: "{{ item.1.group }}"
    status_code: [201]
    validate_certs: no
  loop: "{{ retrieved_cnimm | subelements('users') }}"
  loop_control:
    label: "{{ item.0.name }}_{{ item.1.user }}"
  register: credential_creation_results
  delegate_to: "{{ jump_host }}"
  run_once: true
  when: >
    (item.0.name + '_' + item.1.user) not in existing_credential_names   # ✅ skip existing

- name: Display credential creation summary
  ansible.builtin.debug:
    msg: >
      {{ item.0.name }}_{{ item.1.user }} -
      {{ 'Skipped - already exists' if (item.0.name + '_' + item.1.user)
         in existing_credential_names else 'Created successfully' }}
  loop: "{{ retrieved_cnimm | subelements('users') }}"
  loop_control:
    label: "{{ item.0.name }}_{{ item.1.user }}"
  run_once: true
