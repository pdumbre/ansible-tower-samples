---
- name: Ensure hvac Python library is installed
  ansible.builtin.pip:
    name: hvac
    state: present

- name: Write secret using Vault Token
  community.hashi_vault.vault_kv2_write:
    url: "{{ vault_addr }}"
    auth_method: token
    token: "{{ vault_token }}"
    engine_mount_point: secret
    path: myapp/serversecret
    data:
      username: "admin"
      password: "secret123"
    validate_certs: false
    ca_cert: null

# Store CN IMM Secrets (Compute Node IMM credentials)
