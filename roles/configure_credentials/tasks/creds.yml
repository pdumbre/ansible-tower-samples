    engine_mount_point: "{{ vault_mount_point }}"
    path: "infrastructure/imm/control-1-ru2"
    data:
      ceuser_name: "CEUSER"
      ceuser_password: "qQ-03ywHJ26TejshriBhagwa"
      ceuser_group: "Administrator"
