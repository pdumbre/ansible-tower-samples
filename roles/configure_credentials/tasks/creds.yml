
- name: Ensure hvac Python library is installed
  ansible.builtin.pip:
    name: hvac
    state: present
    

- name: Extract and combine secrets from vault data
  ansible.builtin.set_fact:
    vault_secrets:
      cnimm: "{{ vault_response.CNIMMSecret.CNIMMSecret | default([]) }}"
      switch: "{{ vault_response.SwitchSecret.SwitchSecret | default([]) }}"
  when: vault_response is defined

  
- name: Display retrieved cnimm data
  debug:
    var: vault_secrets
  register: vault_result_cnimm
