- name: Set server name
  ansible.builtin.set_fact:
    server_name: "control-1-ru2"
    
- name: Parse BMC credentials from environment variable
  ansible.builtin.set_fact:
    bmc_credentials_parsed: "{{ lookup('env', 'BMC_CREDENTIALS') | from_json }}"
  when: lookup('env', 'BMC_CREDENTIALS') != ''

- name: Get server-specific users from BMC credential
  ansible.builtin.set_fact:
    server_bmc_users: "{{ bmc_credentials_parsed[server_name] }}"
  when:
    - bmc_credentials_parsed is defined
    - server_name in bmc_credentials_parsed

- name: Display server-specific BMC users
  ansible.builtin.debug:
    msg:
      - "Server: {{ server_name }}"
      - "Users: {{ server_bmc_users | map(attribute='user') | list }}"
      - "Total users: {{ server_bmc_users | length }}"
  when: server_bmc_users is defined

- name: Get USERID credentials for server
  ansible.builtin.set_fact:
    server_userid_info: "{{ server_bmc_users | selectattr('user', 'equalto', 'USERID') | first }}"
  when:
    - server_bmc_users is defined
    - server_bmc_users | selectattr('user', 'equalto', 'USERID') | list | length > 0

- name: Decode USERID password
  ansible.builtin.set_fact:
    server_userid_password_decoded: "{{ server_userid_info.password | b64decode }}"
  when: server_userid_info is defined

- name: Display USERID credentials
  ansible.builtin.debug:
    msg:
      - "USERID User: {{ server_userid_info.user }}"
      - "USERID Group: {{ server_userid_info.group }}"
  when: server_userid_info is defined
  no_log: false

- name: Warning if server not found in BMC credentials
  ansible.builtin.debug:
    msg: "WARNING: Server '{{ server_name }}' not found in BMC credentials"
  when:
    - bmc_credentials_parsed is defined
    - server_name not in bmc_credentials_parsed

- name: Warning if BMC_CREDENTIALS not available
  ansible.builtin.debug:
    msg: "WARNING: BMC_CREDENTIALS environment variable not set. Ensure the BMC credential is attached to the job template."
  when: lookup('env', 'BMC_CREDENTIALS') == ''
  ansible.builtin.debug:
    msg: "Nodes in combined credential: {{ bmc_credentials_dict.keys() | list }}"
  run_once: true
