    - name: Create storage configuration job for deletion
      uri:
        url: "{{ bmc_manager_url }}{{ job_config.create_job_url }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        body_format: json
        body:
          TargetSettingsURI: "/redfish/v1/Systems/System.Embedded.1/Storage/BOSS.SL.12-1"
        status_code: [200, 201, 202]
      register: create_config_job
      delegate_to: "{{ bmc_delegate_host }}"
      when:
        - has_configure_jobs is defined
        - not has_configure_jobs
