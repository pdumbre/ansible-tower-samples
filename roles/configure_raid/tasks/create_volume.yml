# Create RAID volume

- name: Extract drive URLs (alternative method)
  set_fact:
    drive_urls: "{{ m2_storage.json.Drives | json_query('[*].\"@odata.id\"') }}"
  when: m2_storage.json.Drives is defined

- name: Convert drive URLs to Redfish object array
  set_fact:
    drives: "{{ drive_urls | map('community.general.dict_kv', '@odata.id') | list }}"

- debug:
    msg: "{{ drives }}"

- debug:
    var: drives | type_debug

- name: Create RAID volume
  uri:
    url: "{{ bmc_storage_url}}/{{ controller_name }}/Volumes"
    method: POST
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      RAIDType: "{{ raid_config.raid_level | upper }}"
      Drives: "{{ drives }}"
    status_code: [200, 201, 202, 204]
  register: volume_create
  delegate_to: "{{ bmc_delegate_host }}"
  retries: "{{ max_retries }}"
  delay: "{{ retry_delay }}"
  until: volume_create.status in [200, 201, 202, 204]

- name: Wait for raid configuration job
  include_tasks: wait_for_raid_config_job.yml
  when: bmc_config.requires_job_cleanup is defined

- name: Create raid configuration job
  include_tasks: create_raid_config_job.yml
  when: not has_configuration_job
  
- debug:
    msg: "{{ volume_create }}"

- name: Check if RAID creation failed
  set_fact:
    need_boot: true
  when: >
    (volume_create.status not in [200, 201, 202]) and
    (volume_create.json.error is defined)

- name: Get current boot override settings
  uri:
    url: "{{ bmc_systems_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
  register: current_boot
  delegate_to: "{{ bmc_delegate_host }}"

- name: Set next boot to UEFI Setup (one-time)
  uri:
    url: "{{ bmc_systems_url }}"
    method: PATCH
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      Boot:
        BootSourceOverrideTarget: BiosSetup
        BootSourceOverrideEnabled: Once
    status_code: [200, 204]
  register: uefi_result
  delegate_to: "{{ bmc_delegate_host }}"
  when: >
    current_boot.json.Boot.BootSourceOverrideTarget != "BiosSetup" or
    current_boot.json.Boot.BootSourceOverrideEnabled != "Once"

- name: UEFI boot already set
  debug:
    msg: "UEFI one-time boot is already configured."
  when: >
    current_boot.json.Boot.BootSourceOverrideTarget == "BiosSetup" and
    current_boot.json.Boot.BootSourceOverrideEnabled == "Once"
    
- name: Restart Server
  uri:
    url: "{{ bmc_reset_url }}"
    method: POST
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      ResetType: "ForceRestart"
    status_code: [200, 204]
  delegate_to: "{{ bmc_delegate_host }}"

- name: Wait for system to reach setup state
  uri:
    url: "{{ bmc_systems_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: power_state_check
  delegate_to: "{{ bmc_delegate_host }}"
  retries: "{{ max_retries }}"
  delay: "{{ delay_power_on }}"
  until: >
    power_state_check.json.PowerState is defined and
    power_state_check.json.PowerState == "On"
  failed_when: false

- name: Wait for storage controller discovery
  uri:
    url: "{{ bmc_storage_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
  register: storage_list
  retries: "{{ max_retries }}"
  delay: "{{ delay_power_on }}"
  until:
    - storage_list.status == 200
    - storage_list.json.Members | length > 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Retry volume creation after power cycle
  uri:
    url: "{{ bmc_storage_url}}/{{ controller_name }}/Volumes"
    method: POST
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      RAIDType: "{{ raid_config.raid_level | upper }}"
      Drives: "{{ drives }}"
    status_code: [200, 201, 202, 204]
  register: retry_volume_create
  delegate_to: "{{ bmc_delegate_host }}"
  retries: "{{ max_retries }}"
  delay: "{{ delay_power_on }}"
  until: volume_create.status in [200, 201, 202, 204]
  failed_when: false
  when: 
    - need_boot is defined
    - need_boot | bool
    
- name: Verify volume was created successfully
  uri:
    url: "{{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: volumes_verify
  delegate_to: "{{ bmc_delegate_host }}"

- name: Fail if no volumes created
  fail:
    msg: "No RAID volumes were created!"
  when: (volumes_verify.json.Members | default([]) | length) == 0

- name: Volume creation completed
  debug:
    msg: "RAID volume created successfully"
