---
# Delete a single volume with retry logic

- name: Attempt to delete Dell virtual volume 
  uri:
    url: "https://{{ bmc_ip }}{{ volume_uri }}"
    method: DELETE
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    status_code: [200, 202, 204, 400]
  register: delete_result
  delegate_to: "{{ bmc_delegate_host }}"
  failed_when: >
    delete_result.status not in [200,202,204] and
    (
      delete_result.json.error['@Message.ExtendedInfo'][0].MessageId
      not in ['IDRAC.2.9.STOR023','IDRAC.2.9.STOR026']
    )
    
