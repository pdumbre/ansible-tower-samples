---
# Delete a single volume with retry logic

- name: Attempt to delete Dell virtual volume 
  uri:
    url: "https://{{ bmc_ip }}{{ volume_uri }}"
    method: DELETE
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    status_code: [200, 202, 204]
  register: delete_volume_result
  delegate_to: "{{ bmc_delegate_host }}"
  retries: 1
  delay: 10
  until: delete_volume_result.status in [200, 202, 204]
  failed_when: false

- name: Fallback - Delete volume using racadm command
  shell: >
    sshpass -p '{{ bmc_password }}'
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    {{ hostvars[inventory_hostname].bmc_user }}@{{ hostvars[inventory_hostname].ipv6ULA }}
    "storage deletevd:Disk.Virtual.0:BOSS.SL.12-1"
  register: racadm_delete_result
  delegate_to: "{{ bmc_delegate_host }}"
  failed_when: racadm_delete_result.rc != 0
  when: delete_volume_result.status not in [200, 202, 204]
  
- name: Display racadm deletion result
  debug:
    msg:
      - "racadm command output:"
      - "{{ racadm_delete_result.stdout_lines | default([]) }}"
      - "{{ racadm_delete_result.stderr_lines | default([]) }}"
  when:
    - delete_volume_result.status not in [200, 202, 204]

- name: Check racadm deletion success
  set_fact:
    racadm_deletion_successful: >-
      {{ racadm_delete_result.rc == 0 or
         'successfully' in racadm_delete_result.stdout | lower or
         'deleted' in racadm_delete_result.stdout | lower }}
  when:
    - delete_volume_result.status not in [200, 202, 204]

- debug:
    msg: "{{ delete_volume_result }}"

- debug:
    msg: "{{ racadm_delete_result }}"

- name: Wait for volume deletion
  pause:
    seconds: 30
