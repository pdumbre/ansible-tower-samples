---
# Delete a single Dell RAID volume with retry logic
# Equivalent to the retry logic in NodesRaidConfig.groovy lines 100-119


- debug:
    msg: "https://{{ bmc_ip }}/redfish/v1/Systems/System.Embedded.1/Storage/BOSS.SL.12-1/Volumes/Disk.Virtual.0:BOSS.SL.12-1"


- name: Stage BOSS volume deletion
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/System.Embedded.1/Storage/BOSS.SL.12-1/Volumes/Disk.Virtual.0:BOSS.SL.12-1"
    method: DELETE
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    force_basic_auth: yes
    validate_certs: no
    status_code: [202, 204, 400]
  delegate_to: "{{ bmc_delegate_host }}"
  register: stage_result

- debug:
    msg: "{{ stage_result }}"
    

- name: Attempt to delete Dell virtual volume 
  uri:
    url: "https://{{ bmc_ip }}{{ volume_uri }}"
    method: DELETE
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    status_code: [200, 202, 204, 400]
  register: delete_result
  delegate_to: "{{ bmc_delegate_host }}"

- debug:
    msg: "https://{{ bmc_ip }}{{ volume_uri }}"

- debug:
    msg: "{{ delete_result }}"

- name: Capture job URI if returned
  set_fact:
    job_uri: "{{ delete_result.location | default(None) }}"
    
- debug:
    msg: "{{ job_uri }}"
