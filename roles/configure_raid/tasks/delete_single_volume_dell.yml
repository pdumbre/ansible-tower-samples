---
# Delete a single Dell RAID volume with retry logic
# Equivalent to the retry logic in NodesRaidConfig.groovy lines 100-119


- debug:
    msg: "https://{{ bmc_ip }}{{ volume_uri }}"

- name: Retry delete until iDRAC allows it
  uri:
    url: "https://{{ bmc_ip }}{{ volume_uri }}"
    method: DELETE
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    status_code: [200,202,204,400]
    return_content: yes
  register: delete_result
  retries: 10
  delay: 20
  until: >
    delete_result.status in [200,202,204] or
    (delete_result.json.error['@Message.ExtendedInfo'][0].MessageId == "IDRAC.2.9.STOR026")
  failed_when: >
    delete_result.status not in [200,202,204] and
    delete_result.json.error['@Message.ExtendedInfo'][0].MessageId not in ["IDRAC.2.9.STOR023","IDRAC.2.9.STOR026"]
  delegate_to: "{{ bmc_delegate_host }}"

- debug:
    msg: "{{ delete_result }}"
    
