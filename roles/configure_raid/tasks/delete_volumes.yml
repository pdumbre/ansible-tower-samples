---
# RAID volume deletion

# Build volume list
- name: Build volume list
  set_fact:
    volume_list: "{{ volumes.json | default({}) | json_query('Members[].\"@odata.id\"') | default([]) }}"
    
- set_fact:
    has_configure_jobs: false

# Retrieve job queue status and create list of volumes need to be deleted.

- name: Check job queue status (get member list)
  block:
    - name: Get job queue status
      uri:
        url: "{{ bmc_manager_url }}{{ job_config.url_suffix }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_queue_status
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Fetch full details for each job
      uri:
        url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_details_results
      loop: "{{ job_queue_status.json.Members | default([]) }}"
      loop_control:
        label: "{{ item['@odata.id'] }}"
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Check for Configure jobs in pending jobs
      set_fact:
        has_configure_jobs: >-
          {{ job_details_results.results | default([])
             | map(attribute='json')
             | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled'])
             | selectattr('Name', 'defined')
             | selectattr('Name', 'match', '^Configure:')
             | list | length > 0 }}

    - debug:
        msg: "has_configure_jobs = {{ has_configure_jobs }}"
                  
  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool

# Delete volumes

- name: Delete each virtual volume with retry
  include_tasks: delete_single_volume.yml
  loop: "{{ volume_list }}"
  loop_control:
    loop_var: volume_uri
  when: not ( has_configure_jobs | bool)

# Create configuration job for deletion of volume, reboot and wait for completion.
- name: Delete iDRAC RAID volumes with retry logic
  block:
    - name: Create storage configuration job for deletion
      uri:
        url: "{{ bmc_manager_url }}{{ job_config.create_job_url }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        body_format: json
        body:
          TargetSettingsURI: "{{ item }}/Settings"
        status_code: [200, 201, 202]
      register: delete_job
      loop: "{{ volume_list }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ bmc_delegate_host }}"
      when: not (has_configure_jobs | bool)

    - name: Reboot server if any scheduled jobs were applied
      uri:
        url: "{{ bmc_reset_url }}"
        method: POST
        body:
          ResetType: ForceRestart
        body_format: json
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        status_code: [200, 204]
      register: reboot_result
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Wait for system to come online
      include_tasks: wait_for_system_up.yml
    
    - name: Wait for volumes specific pending jobs to complete
      block:
        - name: Re-fetch job details to check completion
          uri:
            url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
            method: GET
            user: "{{ bmc_user }}"
            password: "{{ bmc_password }}"
            validate_certs: no
            force_basic_auth: yes
            return_content: yes
            status_code: [200]
          register: job_wait_details
          loop: "{{ job_queue_status.json.Members | default([]) }}"
          loop_control:
            label: "{{ item['@odata.id'] }}"
          delegate_to: "{{ bmc_delegate_host }}"

        - name: Filter raid-configuration related jobs only
          set_fact:
            raid_configure_jobs: >-
              {{ job_details_results.results | default([])
                 | map(attribute='json')
                 | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled'])
                 | selectattr('Name', 'defined')
                 | selectattr('Name', 'match', '^Configure:')
                 | list }}

        - name: Debug raid configuration related pending jobs
          debug:
            msg:
              - "Total jobs checked: {{ job_wait_details.results | default([]) | length }}"
              - "RAID configuration related pending jobs: {{ raid_configure_jobs | length }}"

        - name: Assert no raid configuration pending or running jobs remain
          assert:
            that:
              - raid_configure_jobs | length == 0
            fail_msg: "RAID configuration jobs still pending or running"
          retries: 20
          delay: 30

  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool
    - has_configure_jobs or ( volume_list | length > 0 )
    

- name: Verify all RAID volumes are deleted
  uri:
    url: "{{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    force_basic_auth: yes
    validate_certs: no
  register: volumes_check
  retries: 20
  delay: 15
  until: volumes_check.json.Members | length == 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Confirm deletion success
  debug:
    msg: "All Dell RAID volumes successfully deleted."
