---
# Dell iDRAC specific RAID volume deletion
# Equivalent to NodesRaidConfig.groovy lines 93-175

- name: Build volume list
  set_fact:
    volume_list: "{{ volumes.json | default({}) | json_query('Members[].\"@odata.id\"') | default([]) }}"

- name: Check job queue status (get member list)
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Managers/iDRAC.Embedded.1/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: job_queue_status
  delegate_to: "{{ bmc_delegate_host }}"

- name: Fetch full details for each job
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: job_details_results
  loop: "{{ job_queue_status.json.Members | default([]) }}"
  loop_control:
    label: "{{ item['@odata.id'] }}"
  delegate_to: "{{ bmc_delegate_host }}"

- name: Check for pending or running jobs
  set_fact:
    has_pending_jobs: "{{ job_details_results.results | default([]) | map(attribute='json') | selectattr('JobState', 'defined') | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled']) | list | length > 0 }}"

- name: Clean up pending jobs if detected
  debug:
    msg: "Existing job detected. Attempting cleanup before creating a new job..."
  when: has_pending_jobs | bool

- name: Wait for pending jobs to complete
  block:
    - name: Re-fetch job details to check completion
      uri:
        url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_wait_details
      loop: "{{ job_queue_status.json.Members | default([]) }}"
      loop_control:
        label: "{{ item['@odata.id'] }}"
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Assert no pending or running jobs remain
      assert:
        that:
          - job_wait_details.results | default([]) | map(attribute='json') | selectattr('JobState', 'defined') | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled']) | list | length == 0
        fail_msg: "Jobs still pending or running"
      retries: 20
      delay: 30
  when: has_pending_jobs | bool

- name: Delete each virtual volume with retry
  include_tasks: delete_single_volume_dell.yml
  loop: "{{ volume_list }}"
  loop_control:
    loop_var: volume_uri
  when: volume_list | length > 0

- name: Check job queue status (get member list)
  uri:
    url: "{{ bmc_base_url }}/redfish/v1/Managers/iDRAC.Embedded.1/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: job_queue_status
  delegate_to: "{{ bmc_delegate_host }}"

- name: Fetch full details for each job
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: job_details_results
  loop: "{{ job_queue_status.json.Members | default([]) }}"
  loop_control:
    label: "{{ item['@odata.id'] }}"
  delegate_to: "{{ bmc_delegate_host }}"

- name: Check for pending or running jobs
  set_fact:
    has_pending_jobs: "{{ job_details_results.results | default([]) | map(attribute='json') | selectattr('JobState', 'defined') | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled']) | list | length > 0 }}"

- name: Clean up pending jobs if detected
  debug:
    msg: "Existing job detected. Attempting cleanup before creating a new job..."
  when: has_pending_jobs | bool

- name: Wait for pending jobs to complete
  block:
    - name: Re-fetch job details to check completion
      uri:
        url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_wait_details
      loop: "{{ job_queue_status.json.Members | default([]) }}"
      loop_control:
        label: "{{ item['@odata.id'] }}"
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Assert no pending or running jobs remain
      assert:
        that:
          - job_wait_details.results | default([]) | map(attribute='json') | selectattr('JobState', 'defined') | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled']) | list | length == 0
        fail_msg: "Jobs still pending or running"
      retries: 10
      delay: 5
  when: has_pending_jobs | bool

- name: Delete Dell RAID volumes safely
  block:

    - name: Stage volume deletion via config job
      uri:
        url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Oem/EID_674_Manager.CreateConfigJob"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        return_content: yes
        body_format: json
        body:
          TargetSettingsURI: "{{ item }}"
      register: stage_delete
      delegate_to: "{{ bmc_delegate_host }}"
      loop: "{{ volume_list }}"
      loop_control:
        label: "{{ item }}"
      failed_when: >
        stage_delete.status not in [200,202,204,400] and
        (stage_delete.json.error['@Message.ExtendedInfo'][0].MessageId
          not in ['IDRAC.2.9.STOR023','IDRAC.2.9.STOR026'])

    - name: Debug job result
      debug:
        msg: "{{ stage_delete }}"


    - name: Fetch Dell job collection
      uri:
        url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/Jobs"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        return_content: yes
      register: dell_jobs
      delegate_to: "{{ bmc_delegate_host }}"
      until: >-
        dell_jobs.json.Members | default([])
        | map(attribute='JobState', default='')
        | select('in', ['New', 'Running', 'Scheduled'])
        | list | length == 0
      retries: 20
      delay: 30

    - name: Extract job URIs
      set_fact:
        dell_job_uris: >-
          {{
            dell_jobs.json.Members | default([])
            | map(attribute='@odata.id', default=None)
            | list
          }}

    - name: Build active job list
      set_fact:
        active_dell_jobs: >-
          {{
            dell_jobs.json.Members | default([])
            | selectattr('JobState', 'in', ['New', 'Running', 'Scheduled'])
            | list
          }}

  
    - name: Reboot server if required
      uri:
        url: "https://{{ bmc_ip }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
        method: POST
        body:
          ResetType: ForceRestart
        body_format: json
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        status_code: [200, 204]
      when: active_dell_jobs | selectattr('JobState', 'equalto', 'Scheduled') | list | length > 0
      delegate_to: "{{ bmc_delegate_host }}"

- name: Verify all RAID volumes are deleted
  uri:
    url: "{{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    force_basic_auth: yes
    validate_certs: no
  register: volumes_check
  retries: 20
  delay: 15
  until: volumes_check.json.Members | length == 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Confirm deletion success
  debug:
    msg: "All Dell RAID volumes successfully deleted."

