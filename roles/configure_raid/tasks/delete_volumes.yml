---
# RAID volume deletion

# Build volume list
- name: Build volume list
  set_fact:
    volume_list: "{{ volumes.json | default({}) | json_query('Members[].\"@odata.id\"') | default([]) }}"
    
- set_fact:
    has_configure_jobs: false

# Delete previously failed jobs in queue
- name: Delete failed jobs in queue
  include_tasks: delete_stale_failed_jobs.yml

# Clear pending storage configuration
#- name: Clear pending storage configuration
 # include_tasks: clear_pending_storage_config.yml
  
# Reboot system and wait to come online
- name: Reboot server and wait for system to come online
  include_tasks: wait_for_system_up.yml
  when:
    - (failed_jobs | length > 0) 
    #- (failed_jobs | length > 0) or (clear_pending_available | bool)
   
# Retrieve existing RAID Configuration Job
- name: Check existing RAID Configuration Job
  include_tasks: check_raid_config_job.yml
  when: volume_list | length > 0 

# Delete volumes
- name: Delete each virtual volume with retry
  include_tasks: delete_single_volume.yml
  loop: "{{ volume_list }}"
  loop_control:
    loop_var: volume_uri
  when: 
    - not has_configure_jobs 
    - volume_list | length > 0 

# Create configuration job for deletion of volume, reboot and wait for completion.
- name: Delete RAID volumes with retry logic
  block:
    - name: Check existing RAID Configuration Job
      #include_tasks: check_raid_config_job.yml
      include_tasks: t.yml
      when: not has_configure_jobs
    
    - name: Create raid config job
      include_tasks: create_raid_config_job.yml
      when: not has_configure_jobs

    - name: Wait for system to come online
      include_tasks: wait_for_system_up.yml

    - name: Wait until RAID configure jobs to complete
      include_tasks: wait_for_raid_config_job.yml
      
  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool
    - volume_list | length > 0 
    
# Check whether RAID volume is deleted or not
- name: Verify all RAID volumes are deleted
  uri:
    url: "{{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    force_basic_auth: yes
    validate_certs: no
  register: volumes_check
  delegate_to: "{{ bmc_delegate_host }}"

# Reset system if volume still not deleted
- name:  Reset system if volume still not deleted
  shell: >
    sshpass -p '{{ bmc_password }}'
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    {{ hostvars[inventory_hostname].bmc_user }}@{{ hostvars[inventory_hostname].ipv6ULA }}
    "racreset"
  register: racreset_result
  delegate_to: "{{ bmc_delegate_host }}"
  failed_when: racreset_result.rc !=0
  when: volumes_check.json.Members | length > 0
 
  

- name: Confirm deletion success
  debug:
    msg: "All Dell RAID volumes successfully deleted."
