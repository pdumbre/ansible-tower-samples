---
# RAID volume deletion

# Build volume list
- name: Build volume list
  set_fact:
    volume_list: "{{ volumes.json | default({}) | json_query('Members[].\"@odata.id\"') | default([]) }}"

# Retrieve job queue status and create list of volumes need to be deleted.

- name: Check job queue status (get member list)
  block:
    - name: Get job queue status
      uri:
        url: "{{ bmc_manager_url }}{{ job_config.url_suffix }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_queue_status
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Fetch full details for each job
      uri:
        url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_details_results
      loop: "{{ job_queue_status.json.Members | default([]) }}"
      loop_control:
        label: "{{ item['@odata.id'] }}"
      delegate_to: "{{ bmc_delegate_host }}"

    - debug:
        msg: "job details: {{ job_details_results.results }}"

    - name: Check for pending or running jobs
      set_fact:
        has_pending_jobs: "{{ job_details_results.results | default([]) | map(attribute='json') | selectattr('JobState', 'defined') | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled']) | list | length > 0 }}"
                  
    - name: Extract volumes with pending jobs
      set_fact:
        volumes_with_pending_jobs: >-
          {{ job_details_results.results | default([])
             | map(attribute='json')
             | selectattr('JobState', 'in', ['New', 'Scheduled', 'Running', 'Pending'])
             | map(attribute='Target', default='')
             | select('string')
             | list }}

    - name: Filter volumes without pending jobs
      set_fact:
        safe_volumes_to_delete: >-
          {{ volume_list | default([])
             | reject('search', volumes_with_pending_jobs | join('|'))
             | list
             if volumes_with_pending_jobs | length > 0
             else volume_list | default([]) }}

    - name: Debug volume filtering
      debug:
        msg:
          - "Total volumes: {{ volume_list | default([]) | length }}"
          - "Volumes with pending jobs: {{ volumes_with_pending_jobs | length }}"
          - "Pending job targets: {{ volumes_with_pending_jobs }}"
          - "Safe volumes to delete: {{ safe_volumes_to_delete | length }}"
          - "Safe volume URIs: {{ safe_volumes_to_delete }}"


    - name: Debug safe volumes to delete
      debug:
        msg:
          - "safe_volumes_to_delete: {{ safe_volumes_to_delete }}"
 
    - name: Update volume list with safe volumes
      set_fact:
        volume_list: "{{ safe_volumes_to_delete }}"
  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool

# Delete volumes

- name: Delete each virtual volume with retry
  include_tasks: delete_single_volume.yml
  loop: "{{ volume_list }}"
  loop_control:
    loop_var: volume_uri
  when: volume_list | length > 0

# Create configuration job for deletion of volume, reboot and wait for completion.
- name: Delete iDRAC RAID volumes with retry logic
  block:
    - name: Create storage configuration job for deletion
      uri:
        url: "{{ bmc_manager_url }}{{ job_config.create_job_url }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        body_format: json
        body:
          TargetSettingsURI: "{{ item }}/Settings"
        status_code: [200, 201, 202]
      register: delete_job
      loop: "{{ volume_list }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ bmc_delegate_host }}"
      when: safe_volumes_to_delete | length > 0

    - name: Reboot server if any scheduled jobs were applied
      uri:
        url: "{{ bmc_reset_url }}"
        method: POST
        body:
          ResetType: ForceRestart
        body_format: json
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        status_code: [200, 204]
      register: reboot_result
      when: 
        - ( has_pending_jobs | bool )or ( safe_volumes_to_delete | length > 0 )
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Wait for server to come back
      wait_for:
        host: "{{ bmc_ip }}"
        port: 443
        timeout: 300
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Wait for volumes specific pending jobs to complete
      block:
        - name: Re-fetch job details to check completion
          uri:
            url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
            method: GET
            user: "{{ bmc_user }}"
            password: "{{ bmc_password }}"
            validate_certs: no
            force_basic_auth: yes
            return_content: yes
            status_code: [200]
          register: job_wait_details
          loop: "{{ job_queue_status.json.Members | default([]) }}"
          loop_control:
            label: "{{ item['@odata.id'] }}"
          delegate_to: "{{ bmc_delegate_host }}"

        - name: Filter volume-related jobs only
          set_fact:
            volume_related_jobs: >-
              {{ job_wait_details.results | default([])
                 | map(attribute='json')
                 | selectattr('JobState', 'defined')
                 | selectattr('Target', 'defined')
                 | selectattr('Target', 'search', '(Storage|Volume|Disk|RAID)')
                 | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled'])
                 | list }}

        - name: Debug volume-related pending jobs
          debug:
            msg:
              - "Total jobs checked: {{ job_wait_details.results | default([]) | length }}"
              - "Volume-related pending jobs: {{ volume_related_jobs | length }}"
              - "Job targets: {{ volume_related_jobs | map(attribute='Target') | list }}"

        - name: Assert no volume-related pending or running jobs remain
          assert:
            that:
              - volume_related_jobs | length == 0
            fail_msg: "Volume-related jobs still pending or running: {{ volume_related_jobs | map(attribute='Target') | list }}"
          retries: 10
          delay: 5

  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool
    - ( has_pending_jobs | bool )or ( safe_volumes_to_delete | length > 0 )

- name: Verify all RAID volumes are deleted
  uri:
    url: "{{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    force_basic_auth: yes
    validate_certs: no
  register: volumes_check
  retries: 20
  delay: 15
  until: volumes_check.json.Members | length == 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Confirm deletion success
  debug:
    msg: "All Dell RAID volumes successfully deleted."
