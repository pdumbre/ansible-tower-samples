---
# RAID volume deletion

# Build volume list
- name: Build volume list
  set_fact:
    volume_list: "{{ volumes.json | default({}) | json_query('Members[].\"@odata.id\"') | default([]) }}"
    
- set_fact:
    has_configure_jobs: false
   
# Retrieve existing RAID Configuration Job
- name: Check existing RAID Configuration Job
  include_tasks: check_raid_config_job.yml
  when: volume_list | length > 0 

# Delete volumes
- name: Delete each virtual volume with retry
  include_tasks: delete_single_volume.yml
  loop: "{{ volume_list }}"
  loop_control:
    loop_var: volume_uri
  when: 
    - not has_configure_jobs 
    - volume_list | length > 0 

# Create configuration job for deletion of volume, reboot and wait for completion.
- name: Delete RAID volumes with retry logic
  block:
    - name: Check existing RAID Configuration Job
      include_tasks: check_raid_config_job.yml
      when: not has_configure_jobs
    
    - name: Create raid config job
      include_tasks: create_raid_config_job.yml
      when: not has_configure_jobs

    - name: Wait for system to come online
      include_tasks: wait_for_system_up.yml

    - name: Wait until RAID configure jobs to complete
      include_tasks: wait_for_raid_config_job.yml
      
  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool
    - volume_list | length > 0 
    

 # Wait for volume discovery
- name: Wait for volume discovery
  uri:
    url: "{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
  register: volume_list
  retries: "{{ max_retries }}"
  delay: "{{ delay_power_on }}"
  until:
    - volume_list.status == 200
    - volumes_list.json.Members | length > 0
  delegate_to: "{{ bmc_delegate_host }}"  

- name: Confirm deletion success
  debug:
    msg: "All Dell RAID volumes successfully deleted."
