---
# Dell iDRAC specific RAID volume deletion
# Equivalent to NodesRaidConfig.groovy lines 93-175

- name: Build volume list
  set_fact:
    volume_list: "{{ volumes.json | default({}) | json_query('Members[].\"@odata.id\"') | default([]) }}"

- name: Pre-Deletion Cleanup Block
  block:
    - name: Get current Job Queue status
      uri:
        url: "https://{{ bmc_ip }}/redfish/v1/JobService/Jobs"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        force_basic_auth: yes
        validate_certs: no
      register: initial_jobs
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Clear Queue if jobs exist (Scheduled or Failed)
      uri:
        url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/JobService/Actions/JobService.DeleteJobQueue"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        force_basic_auth: yes
        validate_certs: no
        body_format: json
        body:
          JobID: "JID_CLEARALL"
      delegate_to: "{{ bmc_delegate_host }}"
      when: initial_jobs.json['Members@odata.count'] | int > 0

    - name: Wait for Job Queue to reach Zero
      uri:
        url: "https://{{ bmc_ip }}/redfish/v1/JobService/Jobs"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        force_basic_auth: yes
        validate_certs: no
      register: job_check
      delegate_to: "{{ bmc_delegate_host }}"
      until: job_check.json['Members@odata.count'] | int == 0
      retries: 10
      delay: 10

- name: Delete each virtual volume with retry
  include_tasks: delete_single_volume_dell.yml
  loop: "{{ volume_list }}"
  loop_control:
    loop_var: volume_uri
  when: volume_list | length > 0

- name: Delete iDRAC RAID volumes with retry logic
  block:
    - name: Create storage configuration job for deletion
      uri:
        #url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Actions/Oem/EID_674_Manager.CreateConfigJob"
        url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Oem/EID_674_Manager.CreateConfigJob"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        body_format: json
        body:
          TargetSettingsURI: "{{ item }}/Settings"
        status_code: [200, 201, 202]
      register: delete_job
      loop: "{{ volume_list }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ bmc_delegate_host }}"
      failed_when: false

    - name: Debug delete job result
      debug:
        msg: "{{ delete_job }}"

    - name: Check job queue status (get member list)
      uri:
        url: "{{ bmc_manager_url }}{{ job_config.url_suffix }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_queue_status
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Fetch full details for each job
      uri:
        url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: job_details_results
      loop: "{{ job_queue_status.json.Members | default([]) }}"
      loop_control:
        label: "{{ item['@odata.id'] }}"
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Check for pending or running jobs
      set_fact:
        has_pending_jobs: "{{ job_details_results.results | default([]) | map(attribute='json') | selectattr('JobState', 'defined') | selectattr('JobState', 'in', ['Pending', 'Running', 'New', 'Scheduled']) | list | length > 0 }}"

    - name: Clean up pending jobs if detected
      debug:
        msg: "Existing job detected. Attempting cleanup before creating a new job..."
      when: has_pending_jobs | bool

    - name: Reboot server if any scheduled jobs were applied
      uri:
        url: "{{ bmc_reset_url }}"
        method: POST
        body:
          ResetType: ForceRestart
        body_format: json
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        status_code: [200, 204]
      register: reboot_result
      when: has_pending_jobs | selectattr('JobState', 'equalto', 'Scheduled') | list | length > 0
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Wait for power cycle to complete
      pause:
        seconds: 60
      when: reboot_result is defined

  when:
    - bmc_config.requires_job_cleanup is defined
    - bmc_config.requires_job_cleanup | bool

- name: Verify all RAID volumes are deleted
  uri:
    url: "{{ bmc_storage_url }}/{{ controller_name }}/Volumes"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    force_basic_auth: yes
    validate_certs: no
  register: volumes_check
  retries: 20
  delay: 15
  until: volumes_check.json.Members | length == 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Confirm deletion success
  debug:
    msg: "All Dell RAID volumes successfully deleted."

