---
# roles/configure_nodes_raid/tasks/power_management.yml
# Common power management tasks for both Dell and Lenovo

- name: Set current power state
  set_fact:
    current_power_state: "{{ bmc_systems_details.json.PowerState }}"

- name: Debug current power state
  debug:
    msg: "Current power state: {{ current_power_state }}"

- name: Check if power state change needed
  set_fact:
    power_update_required: "{{ current_power_state != power_config.desired_power_state }}"

- name: Debug power_update_required
  debug:
    msg: "Current power state: {{ power_update_required }}"

- name: Power on system if needed
  block:
  
    - name: Send power on command
      uri:
        url: "{{ bmc_systems_url }}{{ power_config.url_suffix }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: json
        body:
          ResetType: "On"
        status_code: [200, 202, 204]
      delegate_to: "{{ bmc_delegate_host }}"
      register: power_on_result

    - name: Wait for system to reach setup state
      uri:
        url: "{{ bmc_systems_url }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: power_state_check
      delegate_to: "{{ bmc_delegate_host }}"
      retries: "{{ max_retries }}"
      delay: "{{ delay_power_on }}"
      until: >
        power_state_check.json.PowerState is defined and
        power_state_check.json.PowerState == "On"

    - name: Verify power state
      uri:
        url: "{{ bmc_systems_url }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        status_code: [200, 201]
      delegate_to: "{{ bmc_delegate_host }}"
      register: verify_power
      retries: 5
      delay: 10

    - name: Log power state change
      debug:
        msg: "System powered on successfully. Current state: {{ verify_power.json.PowerState }}"

  when: 
    - power_update_required | bool
    - power_config.desired_power_state == "On"

- name: Power off system if needed
  block:
    - name: Send graceful shutdown command
      uri:
        url: "{{ bmc_systems_url }}{{ power_config.url_suffix }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: json
        body:
          ResetType: "GracefulShutdown"
        status_code: [200, 202, 204]
      delegate_to: "{{ bmc_delegate_host }}"
      register: power_off_result
      ignore_errors: true

    - name: Force power off if graceful shutdown fails
      uri:
        url: "{{ bmc_systems_url }}{{ power_config.url_suffix }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: json
        body:
          ResetType: "ForceOff"
        status_code: [200, 202, 204]
      delegate_to: "{{ bmc_delegate_host }}"
      when: power_off_result is failed


    - name: Verify power off state
      uri:
        url: "{{ bmc_systems_url}}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        status_code: [200, 201]
      delegate_to: "{{ bmc_delegate_host }}"
      register: verify_power_off
      retries: "{{ max_retries }}"
      delay: "{{ delay_power_off }}"

    - name: Log power off state
      debug:
        msg: "System powered off successfully. Current state: {{ verify_power_off.json.PowerState }}"

  when:
    - power_update_required | bool
    - power_config.desired_power_state == "Off"

- name: Power cycle system if needed
  block:
    - name: Send power cycle command
      uri:
        url: "{{ bmc_systems_url }}{{ power_config.url_suffix }}"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        body_format: json
        body:
          ResetType: "ForceRestart"
        status_code: [200, 202, 204]
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Wait for system to reach setup state
      uri:
        url: "{{ bmc_systems_url }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: no
        force_basic_auth: yes
        return_content: yes
        status_code: [200]
      register: power_state_check
      delegate_to: "{{ bmc_delegate_host }}"
      retries: "{{ max_retries }}"
      delay: "{{ delay_power_on }}"
      until: >
        power_state_check.json.PowerState is defined and
        power_state_check.json.PowerState == "On"

    - name: Log power cycle completion
      debug:
        msg: "System power cycled successfully"

  when: power_config.desired_power_state == "Restart"
