
- name: Fetch Dell job collection
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    return_content: yes
  register: dell_job_collection
  delegate_to: "{{ bmc_delegate_host }}"

- name: Extract job URIs
  set_fact:
    dell_job_uris: >-
      {{
        dell_job_collection.json.Members | default([])
        | map(attribute='@odata.id')
        | list
      }}

- name: Fetch Dell job details
  uri:
    url: "https://{{ bmc_ip }}{{ item }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    return_content: yes
  loop: "{{ dell_job_uris }}"
  register: dell_job_details
  delegate_to: "{{ bmc_delegate_host }}"
  when: dell_job_uris | length > 0

- name: Build active job list
  set_fact:
    active_dell_jobs: >-
      {{
        (dell_job_details.results | default([]))
        | map(attribute='json')
        | selectattr('JobState','in',['New','Running','Scheduled'])
        | list
      }}

- name: Detect scheduled jobs
  set_fact:
    scheduled_dell_jobs: >-
      {{
        active_dell_jobs
        | selectattr('JobState','equalto','Scheduled')
        | list
      }}


- name: Reboot server if scheduled jobs exist
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
    method: POST
    body:
      ResetType: ForceRestart
    body_format: json
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    status_code: [200,204]
  when: scheduled_dell_jobs | length > 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Wait for iDRAC after reboot
  wait_for:
    host: "{{ bmc_ip }}"
    port: 443
    delay: 20
    timeout: 600
  when: scheduled_dell_jobs | length > 0

- name: Fail if active jobs still present
  fail:
    msg: "Dell job queue still contains active jobs: {{ active_dell_jobs }}"
  when: active_dell_jobs | length > 0
