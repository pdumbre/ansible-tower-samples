
- name: Fetch jobs collection
  uri:
    url: "{{ bmc_manager_url }}/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    return_content: yes
    status_code: [200]
  register: job_queue_status
  delegate_to: "{{ bmc_delegate_host }}"

- debug:
    msg: "{{ job_queue_status.json.Members }}"
    
- name: Fetch full details for each job
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    return_content: yes
  loop: "{{ job_queue_status.json.Members | default([]) }}"
  register: job_details_results
  delegate_to: "{{ bmc_delegate_host }}"
  loop_control:
    label: "{{ item['@odata.id'] }}"  

- name: Build active job list
  set_fact:
    active_jobs: >-
      {{
        (job_details_results.results | default([]))
        | map(attribute='json')
        | selectattr('JobState','in',['Pending', 'New','Running','Scheduled'])
        | list
      }}

- name: Detect scheduled jobs
  set_fact:
    scheduled_jobs: >-
      {{
        active_jobs
        | selectattr('JobState','equalto','Scheduled')
        | list
      }}

- debug:
    msg: "{{ scheduled_jobs }}"

- name: Reboot server if scheduled jobs exist
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
    method: POST
    body:
      ResetType: ForceRestart
    body_format: json
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    status_code: [200,204]
  when: scheduled_jobs | length > 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Wait for iDRAC after reboot
  wait_for:
    host: "{{ bmc_ip }}"
    port: 443
    delay: 20
    timeout: 600
  when: scheduled_jobs | length > 0

- name: Fail if active jobs still present
  fail:
    msg: "Job queue still contains active jobs: {{ active_jobs }}"
  when: active_jobs | length > 0
