
- name: Fetch Dell job queue
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    return_content: yes
  register: dell_jobs_initial
  delegate_to: "{{ bmc_delegate_host }}"


- name: Extract scheduled jobs
  set_fact:
    scheduled_dell_jobs: >-
      {{
        dell_jobs_initial.json.Members | default([])
        | selectattr('JobState','equalto','Scheduled')
        | list
      }}

- name: Reboot server if scheduled jobs exist
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
    method: POST
    body:
      ResetType: ForceRestart
    body_format: json
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    status_code: [200, 204]
  when: scheduled_dell_jobs | length > 0
  delegate_to: "{{ bmc_delegate_host }}"

- name: Wait for iDRAC to become reachable after reboot
  wait_for:
    host: "{{ bmc_ip }}"
    port: 443
    delay: 20
    timeout: 600
  when: scheduled_dell_jobs | length > 0

- name: Wait for Dell job queue to clear completely
  uri:
    url: "https://{{ bmc_ip }}/redfish/v1/Managers/iDRAC.Embedded.1/Oem/Dell/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    return_content: yes
  register: dell_jobs
  delegate_to: "{{ bmc_delegate_host }}"
  until: >
    (
      dell_jobs.json.Members | default([])
      | selectattr('JobState','in',['New','Running','Scheduled'])
      | list
      | length
    ) == 0
  retries: 30
  delay: 20


- name: Confirm Dell job queue is clear
  debug:
    msg: "Dell Lifecycle Controller job queue is clear. Safe to proceed."
