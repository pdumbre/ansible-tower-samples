

# Seconds to wait after power cycle
power_wait_seconds: 300
power_off_wait_seconds: 5
boot_slot_settle_seconds: 240  # 4 minutes for BIOS to settle after reboot

# Timeouts and retries
command_timeout: 300
retry_count: 3
retry_delay: 10

# MTM to Server Model Mapping
mtm_to_model:
  # Lenovo ThinkSystem SR645
  "7D2XCTO1WW": "sr645"
  
  # Lenovo ThinkSystem SR630
  "7X02CTO1WW": "sr630"
  
  # Lenovo ThinkSystem SR665
  "7D2VCTO1WW": "sr665"
  
  # Lenovo ThinkSystem SR650
  "7D76CTO1WW": "sr650"
  
  # Lenovo ThinkSystem SR675
  "7D9RCTO1WW": "sr675"
  "7D9RCTO2WW": "sr675"
  
  # Lenovo ThinkSystem SR630v3
  "7D73CTO1WW": "sr630v3"
  
  # Dell XLR660
  "2668": "xlr660"
  
  # Dell XE7745
  "3350": "xe7745"

# Supported device types
lenovo_supported_devices:
  - sr645
  - sr630v3
  - sr675

# System product data configuration
system_product_identifiers:
  sr645: "ThinkSystem SR645 BCQQ"
  sr630v3: "ThinkSystem SR630V3 BRQX"

manufacturer_name: "Lenovo"

# Secure Boot and Legacy BIOS (sr675 specific)
secure_boot_setting: "Disabled"
legacy_bios_setting: "Enabled"

# OneCLI image filenames as stored in your firmware repository
onecli_34_image: "lnvgy_utl_lxce_onecli3.4.0_rhels8_x86-64.tgz"
onecli_41_image: "lnvgy_utl_lxce_onecli4.1.0_rhels8_x86-64.tgz"

# Version threshold — sr645 at or below this firmware gets OneCLI 3.4.0
onecli_version_threshold: "5.1"

# Base directory on Ansible controller where OneCLI will be extracted
onecli_base_dir: "/tmp/onecli_work"

# Path to firmware/image repository on Ansible controller
firmware_repo_path: "/opt/firmware/lenovo"
