onecli_version_rules:
  sr645:
    old_firmware: "3.4.0"
    new_firmware: "4.1.0"
  sr630v3:
    old_firmware: "4.1.0"
    new_firmware: "4.1.0"
  sr675:
    old_firmware: "4.1.0"
    new_firmware: "4.1.0"

onecli_version_threshold: "5.1"

firmware_repo_path: "/mnt/firmware"
onecli_base_dir: "/tmp/awx_onecli"

management_interface: "eth0"
redfish_validate_certs: false
