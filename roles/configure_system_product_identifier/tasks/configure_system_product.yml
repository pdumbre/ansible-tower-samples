
# Lenovo-specific system product configuration

- name: Display Lenovo configuration start
  debug:
    msg:
      - "Starting Lenovo System Product Configuration"
      - "Device Type: {{ node_device_type }}"

- name: Check server power state
  include_tasks: power_management.yml
  vars:
    power_action: "check"


- name: Power on server if needed
  include_tasks: power_management.yml
  vars:
    power_action: "on"
  when: server_power_state | lower in ["off", "poweroff"]

- name: Prepare OneCli on jump host
  include_tasks: prepare_onecli.yml


- name: Set BMC connection string for OneCLI
  set_fact:
    bmc_opts: "--bmc {{ bmc_user }}:{{ bmc_password }}@[{{ ipv6ULA }}]"

- name: Display BMC connection info
  debug:
    msg:
      - "BMC Connection Configuration:"
      - "  IPv6    :   {{ ipv6ULA }}"
      - "  Username:   {{ bmc_user }}"
      - "  Jump host:  {{ onecli_jump_host }}"
      - "  OneCli bin: {{ onecli_bin }}"
      - "  OneCli ver: {{ selected_onecli_version }}"

# -----------------------------------------------------------------------
# sr645 — Product Identifier
# -----------------------------------------------------------------------
- name: Configure Product Identifier for sr645
  block:
    - name: Set sr645 Product Identifier using OneCLI
      command: >
        {{ onecli_bin }} config set
        SYSTEM_PROD_DATA.SysInfoProdIdentifier
        "{{ system_product_identifiers.sr645 }}"
        --nolog
        {{ bmc_opts }}
      environment:
        LD_LIBRARY_PATH: "{{ onecli_libs }}"
      delegate_to: "{{ onecli_jump_host }}"
      register: sr645_product_id
      retries: "{{ retry_count }}"
      delay: "{{ retry_delay }}"
      until: sr645_product_id.rc == 0
      changed_when: "'Successfully' in sr645_product_id.stdout"
      failed_when: sr645_product_id.rc != 0

    - name: Display sr645 Product Identifier result
      debug:
        msg: "Successfully configured Product Identifier for sr645: {{ system_product_identifiers.sr645 }}"

  when: node_device_type == "sr645"

