
- name: Display system configuration
  debug:
    msg:
      - "Device Type: {{ node_device_type }}"

- name: Assert supported device type
  assert:
    that:
      - node_device_type in ['sr645', 'sr630v3', 'sr675']
    fail_msg: "Unsupported device type: {{ node_device_type }}. Must be one of: sr645, sr630v3, sr675"

- name: Check server power state
  include_tasks: power_management.yml
  vars:
    power_action: "check"
    
  include_tasks: power_management.yml
  vars:
    power_action: "on"
  when: server_power_state | lower in ["off", "poweroff"]


# Configure Product Identifier and Manufacturer for sr645
- name: Configure system product data for sr645
  block:
    - name: Set sr645 Product Identifier and Manufacturer via Redfish
      uri:
        url: "{{ bmc_bios_url }}"
        method: PATCH
        user: "{{ bmc_username }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: yes
        body_format: json
        body:
          Attributes:
            SysInfoProdIdentifier: "{{ system_product_identifiers.sr645 }}"
            SysInfoManufacturerFullName: "{{ manufacturer_name }}"
        status_code: [200, 204]
      register: sr645_config
      retries: "{{ retry_count }}"
      delay: "{{ retry_delay }}"
      until: sr645_config.status in [200, 204]
      delegate_to: localhost
      failed_when: >
        sr645_config.status not in [200, 204] or
        (sr645_config.json is defined and 'error' in sr645_config.json)

    - name: Display sr645 configuration result
      debug:
        msg:
          - "Successfully configured sr645 system product data:"
          - "  Product Identifier: {{ system_product_identifiers.sr645 }}"
          - "  Manufacturer: {{ manufacturer_name }}"

  when: node_device_type == "sr645"

