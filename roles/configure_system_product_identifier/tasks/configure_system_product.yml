# -----------------------------------------------------------------------
# Manufacturer Name — sr645 and sr630v3 only
# -----------------------------------------------------------------------
- name: Configure Manufacturer Name
  block:
    - name: Set Manufacturer Name using OneCLI
      command: >
        {{ onecli_bin }} config set
        SYSTEM_PROD_DATA.SysInfoManufacturerFullName
        "{{ manufacturer_name }}"
        --nolog
        --override
        {{ bmc_opts }}
      environment:
        LD_LIBRARY_PATH: "{{ onecli_libs }}"
      delegate_to: "{{ onecli_jump_host }}"
      register: manufacturer_config
      retries: "{{ retry_count }}"
      delay: "{{ retry_delay }}"
      until: manufacturer_config.rc == 0
      changed_when: "'Successfully' in manufacturer_config.stdout"
      failed_when: manufacturer_config.rc != 0

    - name: Display Manufacturer Name result
      debug:
        msg: "Successfully configured Manufacturer Name: {{ manufacturer_name }}"

  when: node_device_type != "sr675"

# -----------------------------------------------------------------------
# sr675 — Secure Boot and Legacy BIOS via OneCLI
# -----------------------------------------------------------------------
- name: Configure sr675 specific settings
  block:
    - name: Display sr675 configuration notice
      debug:
        msg:
          - "Configuring sr675 specific settings via OneCLI"
          - "This requires multiple power cycles"

    - name: Configure Secure Boot Setting using OneCLI
      command: >
        {{ onecli_bin }} config set
        SecureBootConfiguration.SecureBootSetting
        "{{ secure_boot_setting }}"
        --nolog
        {{ bmc_opts }}
      environment:
        LD_LIBRARY_PATH: "{{ onecli_libs }}"
      delegate_to: "{{ onecli_jump_host }}"
      register: secure_boot_config
      retries: "{{ retry_count }}"
      delay: "{{ retry_delay }}"
      until: secure_boot_config.rc == 0
      changed_when: "'Successfully' in secure_boot_config.stdout"
      failed_when: secure_boot_config.rc != 0

    - name: Display Secure Boot configuration result
      debug:
        msg: "Successfully configured Secure Boot: {{ secure_boot_setting }}"

    - name: Power cycle for Secure Boot changes
      include_tasks: power_management.yml
      vars:
        power_action: "cycle"

    - name: Configure Legacy BIOS using OneCLI
      command: >
        {{ onecli_bin }} config set
        LegacyBIOS.LegacyBIOS
        "{{ legacy_bios_setting }}"
        --nolog
        {{ bmc_opts }}
      environment:
        LD_LIBRARY_PATH: "{{ onecli_libs }}"
      delegate_to: "{{ onecli_jump_host }}"
      register: legacy_bios_config
      retries: "{{ retry_count }}"
      delay: "{{ retry_delay }}"
      until: legacy_bios_config.rc == 0
      changed_when: "'Successfully' in legacy_bios_config.stdout"
      failed_when: legacy_bios_config.rc != 0

    - name: Display Legacy BIOS configuration result
      debug:
        msg: "Successfully configured Legacy BIOS: {{ legacy_bios_setting }}"

    - name: Final power cycle for Legacy BIOS changes
      include_tasks: power_management.yml
      vars:
        power_action: "cycle"

    - name: Display sr675 configuration completion
      debug:
        msg: "sr675 configuration completed successfully with all power cycles"

  when: node_device_type == "sr675"


- name: Display Lenovo configuration completion
  debug:
    msg:
      - "Lenovo System Product Configuration Completed Successfully"
      - "Device:     {{ node_device_type }}"
      - "OneCli:     {{ selected_onecli_version }}"
