- name: Get credentials for server
  include_role:
    name: common
    tasks_from: credentials.yml
  vars:
    credential_server_name: "{{OCPRole}}-secret"
    credential_userid: "ISFUSER"
    credential_debug: true  # Optional

- name: Use the credentials
  debug:
    msg: "Username: {{ credential_username }}, Password: {{ credential_password }}"

- name: Discover resources
  include_tasks: discovery.yml

- name: Probe job queue endpoint availability
  uri:
    url: "{{ bmc_manager_url }}/Jobs"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200, 404]
  delegate_to: localhost
  register: probe_job_queue 
  failed_when: false

- name: Set BIOS apply method flag
  set_fact:
    use_bios_jobqueue: "{{ probe_job_queue.status | default(404) == 200 }}"

- name: Read checkpoint
  include_role:
    name: common
    tasks_from: checkpoint_read
  vars:
    checkpoint_workflow: "configure_system_indentifier"
    checkpoint_host: "{{ inventory_hostname }}"
 
- name: Detect model and resolve configuration flags
  include_tasks: bios_detect.yml
  #when: "'bios_detect' not in checkpoint_stages_done"

#- name: Write checkpoint
 # include_role:
  #  name: common
   # tasks_from: checkpoint_write
  #vars:
   # checkpoint_workflow: "configure_system_indentifier"
    #checkpoint_stage: "bios_detect"
    #checkpoint_host: "{{ inventory_hostname }}"
 
- name: Configure system product identifier
  include_tasks: configure_system_product.yml
  when: not use_bios_jobqueue | bool
