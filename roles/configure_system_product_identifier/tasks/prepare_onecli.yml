
- name: Determine OneCli version based on firmware and device type
  set_fact:
    selected_onecli_image: >-
      {{ onecli_34_image
         if (bmc_firmware_version is version(onecli_version_threshold, '<=')
             and node_device_type == 'sr645')
         else onecli_41_image }}
    selected_onecli_version: >-
      {{ '3.4.0'
         if (bmc_firmware_version is version(onecli_version_threshold, '<=')
             and node_device_type == 'sr645')
         else '4.1.0' }}
    selected_onecli_download_url: >-
      {{ onecli_34_download_url
         if (bmc_firmware_version is version(onecli_version_threshold, '<=')
             and node_device_type == 'sr645')
         else onecli_41_download_url }}

- name: Display OneCli selection
  debug:
    msg:
      - "Firmware string:     {{ bmc_firmware_version }}"
      - "Version threshold:       {{ onecli_version_threshold }}"
      - "Selected OneCli version: {{ selected_onecli_version }}"
      - "Selected image:          {{ selected_onecli_image }}"
      - "Download URL:            {{ selected_onecli_download_url }}"

- name: Warn if non-sr645 device has firmware at or below version threshold
  debug:
    msg:
      - "WARNING: {{ node_device_type }} has firmware {{ bmc_firmware_version }} <= {{ onecli_version_threshold }}"
      - "Version selection only applies to sr645. Defaulting to OneCli 4.1.0."
  when:
    - node_device_type != 'sr645'
    - bmc_firmware_version is version(onecli_version_threshold, '<=')


- name: Create firmware repository directory if it does not exist
  file:
    path: "{{ firmware_repo_path }}"
    state: directory
    mode: '0755'
  delegate_to: localhost

- name: Check if selected OneCli tarball already exists locally
  stat:
    path: "{{ firmware_repo_path }}/{{ selected_onecli_image }}"
  delegate_to: localhost
  register: onecli_tarball_check

- name: Download selected OneCli tarball from Lenovo
  get_url:
    url: "{{ selected_onecli_download_url }}"
    dest: "{{ firmware_repo_path }}/{{ selected_onecli_image }}"
    mode: '0644'
    timeout: 120
  delegate_to: localhost
  register: onecli_download
  retries: 3
  delay: 10
  until: onecli_download is succeeded
  when: not onecli_tarball_check.stat.exists

- name: Display download result
  debug:
    msg: >-
      {{ 'Downloaded ' + selected_onecli_image
         if not onecli_tarball_check.stat.exists
         else selected_onecli_image + ' already exists locally — skipping download' }}

- name: Clean previous working directory
  file:
    path: "{{ onecli_base_dir }}/{{ rack_unit }}"
    state: absent
  delegate_to: localhost
  register: clean_result
  failed_when:
    - clean_result is failed
    - "'No such file' not in (clean_result.msg | default(''))"

- name: Create working directory structure
  file:
    path: "{{ onecli_base_dir }}/{{ rack_unit }}/onecli"
    state: directory
    mode: '0755'
    recurse: yes
  delegate_to: localhost

- name: Copy OneCli tarball to working directory
  copy:
    src: "{{ firmware_repo_path }}/{{ selected_onecli_image }}"
    dest: "{{ onecli_base_dir }}/{{ rack_unit }}/{{ selected_onecli_image }}"
    mode: '0644'
  delegate_to: localhost

- name: Extract OneCli tarball
  unarchive:
    src: "{{ onecli_base_dir }}/{{ rack_unit }}/{{ selected_onecli_image }}"
    dest: "{{ onecli_base_dir }}/{{ rack_unit }}/onecli/"
    remote_src: yes
  delegate_to: localhost

- name: Remove OneCli tarball after extraction
  file:
    path: "{{ onecli_base_dir }}/{{ rack_unit }}/{{ selected_onecli_image }}"
    state: absent
  delegate_to: localhost

- name: Find OneCli binary
  find:
    paths: "{{ onecli_base_dir }}/{{ rack_unit }}/onecli"
    patterns:
      - "OneCli"
      - "onecli"
    recurse: yes
    file_type: file
  delegate_to: localhost
  register: onecli_binary_search

- name: Fail if OneCli binary not found after extraction
  fail:
    msg: >
      OneCli binary not found under {{ onecli_base_dir }}/{{ rack_unit }}/onecli/.
      Check that {{ selected_onecli_image }} contains an 'OneCli' or 'onecli' binary.
  when: onecli_binary_search.matched == 0

- name: Set OneCli binary path
  set_fact:
    onecli_bin: "{{ onecli_binary_search.files[0].path }}"

- name: Make OneCli binary executable
  file:
    path: "{{ onecli_bin }}"
    mode: '0755'
  delegate_to: localhost

- name: Verify OneCli binary is functional
  command: "{{ onecli_bin }} version"
  register: onecli_version_check
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: Fail if OneCli binary is not executable
  fail:
    msg: >
      OneCli binary at {{ onecli_bin }} failed to run (rc={{ onecli_version_check.rc }}).
      Output: {{ onecli_version_check.stdout | default('') }}
      Error:  {{ onecli_version_check.stderr | default('') }}
  when: onecli_version_check.rc != 0

- name: Display OneCli preparation summary
  debug:
    msg:
      - "OneCli Preparation Complete:"
      - "  Version:           {{ selected_onecli_version }}"
      - "  Binary Path:       {{ onecli_bin }}"
      - "  Working Directory: {{ onecli_base_dir }}/{{ rack_unit }}"
      - "  Runtime output:    {{ onecli_version_check.stdout_lines[0] | default('unknown') }}"
