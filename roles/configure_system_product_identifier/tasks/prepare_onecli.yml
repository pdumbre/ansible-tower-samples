---
# Prepare OneCli binary for execution
# All tasks delegate_to: localhost — OneCli runs on the Ansible controller (AWX EE)

- name: Assert node_device_type is supported
  assert:
    that:
      - node_device_type in onecli_version_rules
    fail_msg: >
      Unsupported device type '{{ node_device_type }}'.
      Must be one of: {{ onecli_version_rules.keys() | list | join(', ') }}

- name: Determine OneCli version based on firmware and device type
  vars:
    _rule: "{{ onecli_version_rules[node_device_type] }}"
    _firmware_key: "{{ 'old_firmware' if bmc_firmware_version is version(onecli_version_threshold, '<=') else 'new_firmware' }}"
    _selected_version: "{{ _rule[_firmware_key] }}"
  set_fact:
    selected_onecli_version: "{{ _selected_version }}"
    selected_onecli_image: "{{ onecli_versions[_selected_version].image }}"
    selected_onecli_binary: "{{ onecli_versions[_selected_version].binary_name }}"
    selected_onecli_download_url: "{{ onecli_versions[_selected_version].download_url }}"

- name: Display OneCli selection
  debug:
    msg:
      - "Raw firmware string:     {{ bmc_firmware_version }}"
      - "Version threshold:       {{ onecli_version_threshold }}"
      - "Selected OneCli version: {{ selected_onecli_version }}"
      - "Selected image:          {{ selected_onecli_image }}"
      - "Binary name in archive:  {{ selected_onecli_binary }}"

- name: Warn if non-sr645 device has firmware at or below version threshold
  debug:
    msg:
      - "WARNING: {{ node_device_type }} has firmware {{ bmc_firmware_version }} <= {{ onecli_version_threshold }}"
      - "Version selection only applies to sr645. Defaulting to OneCli 4.1.0."
  when:
    - node_device_type != 'sr645'
    - bmc_firmware_version is version(onecli_version_threshold, '<=')

# --- Verify image exists on host mount BEFORE attempting anything else ---

- name: Check if OneCli image exists on mounted host directory
  stat:
    path: "{{ firmware_repo_path }}/{{ selected_onecli_image }}"
  delegate_to: localhost
  register: onecli_tarball_check

- name: Fail if OneCli image not found on host mount
  fail:
    msg: >
      OneCli image not found at {{ firmware_repo_path }}/{{ selected_onecli_image }}.
      Ensure the file is present on the Kubernetes host at /data/firmware/onecli/
      and the hostPath volume mount is configured in the AWX CR.
  when: not onecli_tarball_check.stat.exists

# --- Prepare working directory ---

- name: Clean previous working directory for this rack unit
  file:
    path: "{{ onecli_base_dir }}/{{ rack_unit }}"
    state: absent
  delegate_to: localhost
  register: clean_result
  failed_when:
    - clean_result is failed
    - "'No such file' not in (clean_result.msg | default(''))"

- name: Create OneCli working directory
  file:
    path: "{{ onecli_base_dir }}/{{ rack_unit }}/onecli"
    state: directory
    mode: '0755'
    recurse: yes
  delegate_to: localhost

# --- Extract archive ---
# extra_opts forces gzip detection by magic bytes — required because the
# Lenovo image file has no .tgz extension so Ansible cannot auto-detect format

- name: Extract OneCli archive to working directory
  unarchive:
    src: "{{ firmware_repo_path }}/{{ selected_onecli_image }}"
    dest: "{{ onecli_base_dir }}/{{ rack_unit }}/onecli/"
    remote_src: yes
    extra_opts:
      - "--warning=no-unknown-keyword"
  delegate_to: localhost

# --- Locate and validate binary ---
# Binary name is sourced from defaults/main.yml onecli_versions mapping
# — no ambiguous find needed, path is fully deterministic

- name: Set OneCli binary path from known binary name
  set_fact:
    onecli_bin: "{{ onecli_base_dir }}/{{ rack_unit }}/onecli/{{ selected_onecli_binary }}"

- name: Verify OneCli binary exists after extraction
  stat:
    path: "{{ onecli_bin }}"
  delegate_to: localhost
  register: onecli_bin_stat

- name: Fail if OneCli binary not found after extraction
  fail:
    msg: >
      Expected binary '{{ selected_onecli_binary }}' not found at {{ onecli_bin }}.
      List archive contents with:
      tar -tzf {{ firmware_repo_path }}/{{ selected_onecli_image }} | grep -i onecli
  when: not onecli_bin_stat.stat.exists

- name: Ensure OneCli binary is executable
  file:
    path: "{{ onecli_bin }}"
    mode: '0755'
  delegate_to: localhost

- name: Verify OneCli binary is functional
  command: "{{ onecli_bin }} version"
  register: onecli_version_check
  changed_when: false
  failed_when: false
  delegate_to: localhost

- name: Fail if OneCli binary is not functional
  fail:
    msg: >
      OneCli binary at {{ onecli_bin }} failed to run (rc={{ onecli_version_check.rc }}).
      Output: {{ onecli_version_check.stdout | default('') }}
      Error:  {{ onecli_version_check.stderr | default('') }}
  when: onecli_version_check.rc != 0

- name: Display OneCli preparation summary
  debug:
    msg:
      - "OneCli Preparation Complete:"
      - "  Version:     {{ selected_onecli_version }}"
      - "  Binary:      {{ selected_onecli_binary }}"
      - "  Binary Path: {{ onecli_bin }}"
      - "  Runtime:     {{ onecli_version_check.stdout_lines[0] | default('unknown') }}"

