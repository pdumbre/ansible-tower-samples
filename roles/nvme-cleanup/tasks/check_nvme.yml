---
# Check if system has NVMe drives using Redfish API
# This helps determine if cleanup is needed before connecting to the OS

- name: Get storage controllers
  uri:
    url: "{{ bmc_systems_url }}/Storage"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: storage_response
  delegate_to: "{{ bmc_delegate_host }}"

- debug:
    msg: "{{ storage_response.json.Members }}"

- debug:
    msg: "{{ bmc_base_url }}/redfish/v1/Systems/1/Storage/M.2/Drives"

- name: Get drives for each storage controller
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}/Drives"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: false
    force_basic_auth: true
    headers:
      Content-Type: "application/json"
  loop: "{{ storage_response.json.Members }}"
  delegate_to: "{{ bmc_delegate_host }}"
  register: drives_response

- name: Get individual drive details
  uri:
    url: "{{ bmc_base_url }}{{ item.1['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: false
    force_basic_auth: true
    headers:
      Content-Type: "application/json"
  loop: "{{ drives_response.results | subelements('json.Members') }}"
  delegate_to: "{{ bmc_delegate_host }}"
  register: drive_details

- name: Extract NVMe drives only
  set_fact:
    nvme_drives: >-
      {{ nvme_drives | default([]) + 
         [item.json | combine({'drive_url': item.json['@odata.id']})] }}
  loop: "{{ drive_details.results }}"
  when:
    - item.json.Protocol is defined
    - item.json.Protocol == 'NVMe'

- debug:
    msg: "nvme_drives = {{ nvme_drives }}"
