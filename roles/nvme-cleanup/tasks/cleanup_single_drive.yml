

- name: Display drive being cleaned
  debug:
    msg:
      - "=========================================="
      - "Cleaning NVMe Drive via Redfish API"
      - "=========================================="
      - "Drive: {{ drive_info.name }}"

- name: Get drive details via Redfish
  uri:
    url: "{{ bmc_base_url }}{{ drive_info.drive_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: drive_details
  delegate_to: "{{ bmc_delegate_host }}"

- name: Check for SecureErase action
  set_fact:
    secure_erase_available: "{{ '#Drive.SecureErase' in (drive_details.json.Actions | default({})) }}"
    format_available: "{{ '#Drive.Format' in (drive_details.json.Actions | default({})) }}"

- name: Perform Secure Erase
  uri:
    url: "{{ bmc_base_url }}{{ drive_details.json.Actions['#Drive.SecureErase'].target }}"
    method: POST
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body: {}
    status_code: [200, 202, 204]
  register: secure_erase_result
  delegate_to: "{{ bmc_delegate_host }}"
  when:
    - secure_erase_available | bool
  failed_when: false


# Check Secure Erase job status
- name: Check Secure Erase job status
  include_tasks: handle_secure_erase.yml
  when: secure_erase_available | bool

- name: Perform Format
  uri:
    url: "{{ bmc_base_url }}{{ drive_details.json.Actions['#Drive.Format'].target }}"
    method: POST
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    body_format: json
    body:
      FormatType: "{{ format_type | default('FastFormat') }}"
    status_code: [200, 202, 204]
  register: format_result
  delegate_to: "{{ bmc_delegate_host }}"
  when:
    - not (secure_erase_available | bool)
    - format_available | bool


# Fallback: OS-level cleanup if Redfish operations not available
- name: Check if OS-level cleanup is needed
  set_fact:
    needs_os_cleanup: "{{ not (secure_erase_available | bool or format_available | bool) }}"

- name: Display fallback cleanup notice
  debug:
    msg:
      - "WARNING: Redfish SecureErase and Format not available"
      - "Falling back to OS-level cleanup using dd command"
      - "This will write zeros to the drive"
  when: needs_os_cleanup | bool

- name: Perform OS-level drive cleanup using dd (Fallback)
  shell: >
    sshpass -p '{{ bmc_password }}'
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    {{ hostvars[inventory_hostname].bmc_user }}@{{ hostvars[inventory_hostname].ipv6ULA }}
    "dd if=/dev/zero of=/dev/{{ drive_info.name }} bs=1M count=1024 conv=fsync &&
     wipefs -a /dev/{{ drive_info.name }} &&
     partprobe /dev/{{ drive_info.name }} || true"
  register: os_cleanup_result
  delegate_to: "{{ bmc_delegate_host }}"
  when:
    - needs_os_cleanup | bool
    - drive_info.name is defined
  failed_when: false

- name: Display OS-level cleanup result
  debug:
    msg:
      - "OS-level cleanup completed for {{ drive_info.name }}"
      - "Return code: {{ os_cleanup_result.rc | default('N/A') }}"
      - "Status: {{ 'Success' if os_cleanup_result.rc == 0 else 'Failed' }}"
  when: needs_os_cleanup | bool

- name: Set cleanup successful flag for OS-level cleanup
  set_fact:
    cleanup_successful: "{{ os_cleanup_result.rc == 0 }}"
  when: needs_os_cleanup | bool

