---
# Example: Extract Drives from BMC Storage URL response
# This demonstrates how to parse the Drives array from Redfish Storage response

- name: Get storage members via Redfish
  ansible.builtin.uri:
    url: "{{ bmc_storage_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: false
    force_basic_auth: true
    headers:
      Content-Type: "application/json"
  register: storage_response

- name: Get each storage controller details
  ansible.builtin.uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: false
    force_basic_auth: true
    headers:
      Content-Type: "application/json"
  loop: "{{ storage_response.json.Members }}"
  register: controller_details

- name: Build list of valid drive URLs from controllers
  ansible.builtin.set_fact:
    drive_urls: >-
      {{ drive_urls | default([]) +
         item.json.Drives | default([]) }}
  loop: "{{ controller_details.results }}"
  when:
    - item.json.Drives is defined
    - item.json.Drives | length > 0

- name: Get individual drive details
  ansible.builtin.uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: false
    force_basic_auth: true
    headers:
      Content-Type: "application/json"
  loop: "{{ drive_urls }}"
  register: drive_details

- name: Extract NVMe drives only
  ansible.builtin.set_fact:
    nvme_drives: >-
      {{ nvme_drives | default([]) +
         [item.json | combine({'drive_url': item.json['@odata.id']})] }}
  loop: "{{ drive_details.results }}"
  when:
    - item.json.Protocol is defined
    - item.json.Protocol == 'NVMe'

- name: Display NVMe drives
  ansible.builtin.debug:
    msg:
      - "Name      : {{ item.Name }}"
      - "Model     : {{ item.Model }}"
      - "Serial    : {{ item.SerialNumber }}"
      - "Capacity  : {{ item.CapacityBytes }}"
      - "Status    : {{ item.Status.Health }}"
      - "Drive URL : {{ item.drive_url }}"
  loop: "{{ nvme_drives }}"
  
- name: Display detailed drive information
  debug:
    msg: "{{ nvme_drives }}"
  when: nvme_drives is defined
