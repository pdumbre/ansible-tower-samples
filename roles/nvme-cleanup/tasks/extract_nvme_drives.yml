---
# Example: Extract Drives from BMC Storage URL response
# This demonstrates how to parse the Drives array from Redfish Storage response

- name: Retrieve storage collection
  uri:
    url: "{{ bmc_storage_url }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
  register: storage_collection
  delegate_to: "{{ bmc_delegate_host }}"


- name: Build controller list
  set_fact:
    controller_list: "{{ storage_collection.json | json_query('Members[].\"@odata.id\"') }}"


- name: Retrieve storage controller
  set_fact:
    storage_controller_id: >-
      {{ controller_list
         | select('search', storage_config.storage_controller_name)
         | list
         | first
         | default('') }}


- name: Extract controller name
  set_fact:
    controller_name: "{{ storage_controller_id | basename }}"
    
- name: Fail if Storage controller not present
  fail:
    msg: "Storage Subsystem not found."
  when: controller_name is not defined
  
- name: Retrieve storage controllers
  uri:
    url: "{{ bmc_storage_url}}/{{ controller_name }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  register: storage_info
  delegate_to: "{{ bmc_delegate_host }}"

- name: Ensure storage controllers list is not empty
  fail:
    msg: "No storage controllers found!"
  when: storage_info.json.StorageControllers | length == 0

- name: Storage Configuration
  set_fact:
    m2_storage: "{{ storage_info }}"

- debug:
    msg: "{{ m2_storage.json.Drives }}"

- name: Get individual drive details
  uri:
    url: "{{ bmc_base_url }}{{ item['@odata.id'] }}"
    method: GET
    user: "{{ bmc_user }}"
    password: "{{ bmc_password }}"
    validate_certs: no
    force_basic_auth: yes
    return_content: yes
    status_code: [200]
  loop: "{{ m2_storage.json.Drives }}"
  register: drive_details
  delegate_to: "{{ bmc_delegate_host }}"

- debug:
    msg: "drive_details: {{ drive_details }}"
    
- name: Extract NVMe drives (Dell)
  ansible.builtin.set_fact:
    nvme_drives: >-
      {{ nvme_drives | default([]) + [{
        'id'          : item.json.Id,
        'name'        : item.json.Name | default(''),
        'model'       : item.json.Model | default(''),
        'serial'      : item.json.SerialNumber | default(''),
        'capacity_gb' : (item.json.CapacityBytes | default(0) / 1073741824) | round(2),
        'protocol'    : item.json.Protocol | default(''),
        'status'      : item.json.Status.Health | default(''),
        'state'       : item.json.Status.State | default(''),
        'drive_url'   : item.json['@odata.id']
      }] }}
  loop: "{{ drive_details.results }}"
  when:
    - item.json.Protocol is defined
    - item.json.Protocol in ['NVMe', 'PCIe']

- name: Display NVMe drives
  ansible.builtin.debug:
    msg:
      - "Name      : {{ item.Name }}"
      - "Model     : {{ item.Model }}"
      - "Serial    : {{ item.SerialNumber }}"
      - "Capacity  : {{ item.CapacityBytes }}"
      - "Status    : {{ item.Status.Health }}"
      - "Drive URL : {{ item.drive_url }}"
  loop: "{{ nvme_drives }}"
