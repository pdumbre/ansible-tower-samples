---
# SecureErase job monitoring and execution tasks
# This file handles the complete lifecycle of SecureErase operations

- name: SecureErase job monitoring and execution
  block:
    - name: Extract job URL from SecureErase response
      ansible.builtin.set_fact:
        secure_erase_job_url: "{{ secure_erase_result.location }}"
      when:
        - secure_erase_result.status == 202
        - secure_erase_result.location is defined


    - name: Extract job ID from location header
      ansible.builtin.set_fact:
        secure_erase_job_id: "{{ secure_erase_result.location.split('/')[-1] }}"
        secure_erase_job_url: "{{ secure_erase_result.location }}"
      when:
        - secure_erase_result.status == 202
        - secure_erase_result.location is defined

    - name: Debug job ID
      ansible.builtin.debug:
        msg: "SecureErase Job ID: {{ secure_erase_job_id }}"

    - name: Force job start time to NOW via racadm
      ansible.builtin.shell: >
        sshpass -p '{{ bmc_password }}'
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
        {{ hostvars[inventory_hostname].bmc_user }}@{{ hostvars[inventory_hostname].ipv6ULA }}
        "racadm jobqueue create {{ secure_erase_job_id }} -s TIME_NOW -r forced"
      register: racadm_force_result
      delegate_to: "{{ bmc_delegate_host }}"
      when:
        - secure_erase_job_id is defined
      failed_when: racadm_force_result.rc != 0

    - name: Trigger server reboot to execute scheduled job
      ansible.builtin.uri:
        url: "{{ bmc_base_url }}/redfish/v1/Systems/System.Embedded.1/Actions/ComputerSystem.Reset"
        method: POST
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          ResetType: "ForceRestart"
        status_code: [200, 202, 204]
      register: reboot_result
      delegate_to: "{{ bmc_delegate_host }}"

    - name: Wait for server to reboot
      ansible.builtin.pause:
        seconds: 120

    - name: Wait for BMC to become available after reboot
      ansible.builtin.uri:
        url: "{{ bmc_base_url }}/redfish/v1/Systems/System.Embedded.1"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        status_code: [200]
      register: idrac_status
      delegate_to: "{{ bmc_delegate_host }}"
      until: idrac_status.status == 200
      retries: 20
      delay: 30

    - name: Poll SecureErase job status
      ansible.builtin.uri:
        url: "{{ secure_erase_job_url }}"
        method: GET
        user: "{{ bmc_user }}"
        password: "{{ bmc_password }}"
        validate_certs: false
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        status_code: [200, 202]
      register: job_status
      delegate_to: "{{ bmc_delegate_host }}"
      until: >-
        job_status.json.TaskState | default(job_status.json.JobState) in
        ['Completed', 'Failed', 'Killed', 'Exception']
      retries: 30
      delay: 10

    - name: Display SecureErase job result
      ansible.builtin.debug:
        msg:
          - "Job URL   : {{ secure_erase_job_url }}"
          - "State     : {{ job_status.json.TaskState | default(job_status.json.JobState) }}"
          - "Status    : {{ job_status.json.TaskStatus | default(job_status.json.JobStatus) }}"
          - "Message   : {{ job_status.json.Messages | default(job_status.json.Message) | default([]) }}"

    - name: Fail if SecureErase job failed
      ansible.builtin.fail:
        msg: >-
          SecureErase job {{ secure_erase_job_url }} failed with state:
          {{ job_status.json.TaskState | default(job_status.json.JobState) }}
      when: >-
        job_status.json.TaskState | default(job_status.json.JobState) in
        ['Failed', 'Killed', 'Exception']

  when:
    - secure_erase_available | bool
    - secure_erase_result is defined
    - secure_erase_result.status == 202
