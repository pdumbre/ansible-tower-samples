---
# Main tasks file for nvme_cleanup role
# Cleans up NVMe drives by wiping partition tables and clearing data
# Equivalent to CleanupNVMDrive.groovy

- name: Display NVMe cleanup start
  debug:
    msg: "Starting NVMe drive cleanup for {{ inventory_hostname }}"

- name: Discover resources
  include_tasks: discover.yml

- name: Retrieve nvme drives
  include_tasks: check_nvme.yml

- name: Check if system has NVMe drives via Redfish
  include_tasks: extract_nvme_drives.yml

