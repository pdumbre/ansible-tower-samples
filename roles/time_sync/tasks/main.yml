
---
# Main tasks file for time_sync role
# Synchronizes time on BMC and/or OS level
# Vendor-agnostic implementation using Redfish API for BMC

- name: Discover resources
  include_tasks: discovery.yml
  
- name: Display time sync configuration
  debug:
    msg:
      - "Sync BMC time: {{ time_sync_bmc_enabled }}"
      - "Sync OS time: {{ time_sync_os_enabled }}"
      - "NTP server: {{ time_sync_ntp_server }}"

- name: Synchronize BMC time via Redfish API
  include_tasks: sync_bmc_time.yml
  when: time_sync_bmc_enabled | bool

- name: Configure OS time synchronization via chrony/NTP
  include_tasks: sync_os_time.yml
  vars:
    time_sync_chrony_package: "{{ time_sync_chrony_package }}"
    time_sync_chrony_config:  "{{ time_sync_chrony_config }}"
    time_sync_chrony_service: "{{ time_sync_chrony_service }}"
    time_sync_ntp_server:     "{{ time_sync_ntp_server }}"
    time_sync_timezone:       "{{ time_sync_timezone }}"
    time_sync_force_step:     "{{ time_sync_force_step | default(true) }}"
    time_sync_hwclock_sync:   "{{ time_sync_hwclock_sync | default(true) }}"
    time_sync_backup_config:  "{{ time_sync_backup_config | default(true) }}"
    time_sync_retry_delay:    "{{ time_sync_retry_delay | default(10) }}"

- name: Time synchronization completed
  debug:
    msg: "Time synchronization completed successfully"
