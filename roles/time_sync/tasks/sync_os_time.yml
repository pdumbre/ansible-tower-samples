---

- name: Ensure chrony is installed
  package:
    name: "{{ time_sync_chrony_package }}"
    state: present
  become: yes

- name: Backup existing chrony configuration
  copy:
    src: "{{ time_sync_chrony_config }}"
    dest: "{{ time_sync_chrony_config }}.backup"
    remote_src: yes
  become: yes
  failed_when: false
  when: time_sync_backup_config | bool


- name: Configure and verify NTP synchronization (single SSH session via jump host)
  shell: >
    sshpass -p '{{ hostvars[inventory_hostname].ansible_password }}'
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    {{ hostvars[inventory_hostname].ansible_user }}@{{ hostvars[inventory_hostname].ipv6ULA }}
    "
    set -e;

    CHRONY_CONFIG='{{ time_sync_chrony_config }}';
    CHRONY_SERVICE='{{ time_sync_chrony_service }}';
    NTP_SERVER='{{ time_sync_ntp_server }}';
    TIMEZONE='{{ time_sync_timezone }}';
    FORCE_STEP='{{ time_sync_force_step | bool | lower }}';
    HWCLOCK_SYNC='{{ time_sync_hwclock_sync | bool | lower }}';
    RETRY_DELAY='{{ time_sync_retry_delay }}';

    echo '--- Existing NTP server configuration ---';
    grep '^server' \$CHRONY_CONFIG || echo '(none found)';

    echo '--- Updating chrony.conf ---';
    sed -i '/^server /d' \$CHRONY_CONFIG;
    sed -i '/^pool /d'   \$CHRONY_CONFIG;
    echo \"server \$NTP_SERVER\" >> \$CHRONY_CONFIG;
    echo \"Added: server \$NTP_SERVER\";

    echo '--- Enabling and restarting chronyd ---';
    systemctl enable \$CHRONY_SERVICE;
    systemctl restart \$CHRONY_SERVICE;
    sleep 2;

    echo '--- Chrony sources ---';
    chronyc -a sources;

    if [ \"\$FORCE_STEP\" = 'true' ]; then
      echo '--- Forcing chrony sync (burst + makestep) ---';
      chronyc -a 'burst 4/4';
      chronyc -a makestep;
    fi;

    if [ \"\$HWCLOCK_SYNC\" = 'true' ]; then
      echo '--- Syncing hardware clock ---';
      hwclock -w;
    fi;

    echo \"--- Setting timezone to \$TIMEZONE ---\";
    timedatectl set-timezone \$TIMEZONE;

    echo \"--- Waiting \${RETRY_DELAY}s for NTP sync ---\";
    sleep \$RETRY_DELAY;

    echo '--- Verifying NTP synchronization (attempt 1) ---';
    TIMEDATECTL_OUT=\$(timedatectl show);
    echo \"\$TIMEDATECTL_OUT\";
    NTP_SYNC=\$(echo \"\$TIMEDATECTL_OUT\" | grep '^NTPSynchronized=' | cut -d= -f2 | tr -d '[:space:]');
    NTP_ACTIVE=\$(echo \"\$TIMEDATECTL_OUT\" | grep '^NTP=' | cut -d= -f2 | tr -d '[:space:]');
    echo \"NTP            : \$NTP_ACTIVE\";
    echo \"NTPSynchronized: \$NTP_SYNC\";

    if [ \"\$NTP_SYNC\" != 'yes' ]; then
      echo '--- Not synchronized, retrying ---';
      chronyc -a sources;
      chronyc -a 'burst 4/4';
      chronyc -a makestep;
      echo \"--- Waiting \${RETRY_DELAY}s before retry verification ---\";
      sleep \$RETRY_DELAY;
      echo '--- Verifying NTP synchronization (attempt 2) ---';
      TIMEDATECTL_RETRY=\$(timedatectl show);
      echo \"\$TIMEDATECTL_RETRY\";
      NTP_SYNC_RETRY=\$(echo \"\$TIMEDATECTL_RETRY\" | grep '^NTPSynchronized=' | cut -d= -f2 | tr -d '[:space:]');
      NTP_ACTIVE_RETRY=\$(echo \"\$TIMEDATECTL_RETRY\" | grep '^NTP=' | cut -d= -f2 | tr -d '[:space:]');
      echo \"NTP (retry)            : \$NTP_ACTIVE_RETRY\";
      echo \"NTPSynchronized (retry): \$NTP_SYNC_RETRY\";
      if [ \"\$NTP_SYNC_RETRY\" != 'yes' ]; then
        echo '[FAIL] NTP synchronization failed after retries';
        exit 1;
      fi;
      echo \"RESULT_NTP=\$NTP_ACTIVE_RETRY\";
      echo \"RESULT_SYNCED=\$NTP_SYNC_RETRY\";
    else
      echo \"RESULT_NTP=\$NTP_ACTIVE\";
      echo \"RESULT_SYNCED=\$NTP_SYNC\";
    fi
    "
  delegate_to: "{{ bmc_delegate_host }}"
  register: timesync_result
  changed_when: timesync_result.rc == 0

- name: Parse time sync results
  set_fact:
    time_status:
      NTP: >-
        {{ timesync_result.stdout
           | regex_search('RESULT_NTP=(.*)', '\1')
           | first | default('unknown') }}
      NTPSynchronized: >-
        {{ 'yes' if 'RESULT_SYNCED=yes' in timesync_result.stdout else 'no' }}
    time_status_retry:
      NTPSynchronized: >-
        {{ 'yes' if 'RESULT_SYNCED=yes' in timesync_result.stdout else 'no' }}

- name: Display shell block output
  debug:
    msg: "{{ timesync_result.stdout_lines }}"

- name: Display NTP synchronization status
  debug:
    msg:
      - "NTP            : {{ time_status.NTP }}"
      - "NTPSynchronized: {{ time_status.NTPSynchronized }}"

- name: OS time synchronization completed
  debug:
    msg:
      - "========================================="
      - "Time Synchronization Summary"
      - "========================================="
      - "BMC NTP configured via Redfish API: {{ bmc_ntp_config is changed | default(false) or not (bmc_ntp_needs_update | bool) }}"
      - "BMC NTP Servers: {{ time_sync_ntp_servers }}"
      - "OS NTP server  : {{ time_sync_ntp_server }}"
      - "OS timezone    : {{ time_sync_timezone }}"
      - "OS NTP synchronized: {{ time_status_retry.NTPSynchronized | default(time_status.NTPSynchronized) | default('unknown') }}"
      - "========================================="
